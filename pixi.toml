[workspace]
name = "yubo-modal"
channels = ["conda-forge", "nvidia"]
platforms = ["linux-64", "osx-arm64"]

[feature.hyperscalees.system-requirements]
macos = "14.0"

[feature.hyperscalees.dependencies]
python = "3.12.*"
pip = "*"
git = "*"
git-lfs = "*"
maturin = "*"
setuptools = ">=77.0.3,<81.0.0"
numpy = ">=2.3,<2.4"
scipy = ">=1.17,<1.18"
h5py = "*"
numba = "==0.62.1"
llvmlite = "==0.45.1"
protobuf = ">=6.31.1,<7"
scikit-learn = "*"
matplotlib = "*"
pandas = "*"
pybind11 = "==3.0.1"
nomkl = "*"
libblas = { version = "*", build = "*openblas" }
openblas = "*"
libfaiss = { version = "==1.10.0", build = "cpu_openblas*" }
faiss = { version = "==1.10.0", build = "cpu_openblas_py312*" }
faiss-cpu = "==1.10.0"

[feature.hyperscalees.target.linux-64.dependencies]
c-compiler = "*"
cxx-compiler = "*"
swig = "*"
cuda-toolkit = "12.8.*"
cuda-nvcc = "12.8.*"
cuda-cudart-dev = "12.8.*"
ninja = "*"
cmake = "*"
gxx_linux-64 = "*"

[feature.hyperscalees.target.osx-arm64.dependencies]
python = "3.13.*"
faiss = { version = "==1.10.0", build = "cpu_openblas_py313*" }
c-compiler = "*"
cxx-compiler = "*"
ninja = "*"
cmake = "*"
rust = "*"

[feature.hyperscalees.activation.env]
XLA_PYTHON_CLIENT_PREALLOCATE = "false"
HF_HOME = "${HOME}/.cache/yubo/hyperscalees"
HF_HUB_CACHE = "${HOME}/.cache/yubo/hyperscalees"

[feature.hyperscalees.target.linux-64.activation.env]
CUDA_HOME = "$CONDA_PREFIX"
CUDACXX = "$CONDA_PREFIX/bin/nvcc"
TORCH_CUDA_ARCH_LIST = "8.9"
# ennbo's prebuilt Rust extension resolves cblas at load time (no DT_NEEDED on libopenblas).
LD_LIBRARY_PATH = "$CONDA_PREFIX/lib:/usr/lib/x86_64-linux-gnu${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"

[feature.hyperscalees.target.osx-arm64.activation.env]
JAX_PLATFORMS = "mps,cpu"
KMP_DUPLICATE_LIB_OK = "TRUE"
DYLD_LIBRARY_PATH = "$CONDA_PREFIX/lib${DYLD_LIBRARY_PATH:+:$DYLD_LIBRARY_PATH}"
PYTHONPATH = "${PIXI_PROJECT_ROOT}${PYTHONPATH:+:${PYTHONPATH}}"

[feature.hyperscalees.pypi-options]
extra-index-urls = ["https://pypi.nvidia.com"]
no-build-isolation = ["pyvecch"]
index-strategy = "unsafe-best-match"

[feature.hyperscalees.pypi-dependencies]
click = "*"
gymnasium = { version = "==1.2.1", extras = ["box2d"] }
tyro = "*"
tqdm = "*"
huggingface-hub = "==0.36.2"
tokenizers = "*"
einops = "*"
importlib-resources = "*"
pyrwkv-tokenizer = "*"
hydra-core = "*"
fire = "*"
jupyter = "*"
rich = "==15.0.0"
reasoning-gym = "*"
math-verify = { version = "==0.9.0", extras = ["antlr4_9_3"] }
antlr4-python3-runtime = "==4.9.3"
verifiers = { git = "https://github.com/PrimeIntellect-ai/verifiers.git" }
gsm8k = { git = "https://github.com/PrimeIntellect-ai/verifiers.git", subdirectory = "environments/gsm8k" }
renderers = "*"
peft = "==0.18.0"
transformers = "==4.57.1"
accelerate = "==1.11.0"
safetensors = "==0.6.2"
