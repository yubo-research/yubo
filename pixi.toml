[workspace]
name = "yubo-modal"
channels = ["conda-forge", "nvidia"]
platforms = ["linux-64", "osx-arm64"]

[feature.yubo.system-requirements]
macos = "14.0"

[feature.yubo.dependencies]
python = "3.12.*"
pip = "*"
git = "*"
git-lfs = "*"
maturin = "*"
setuptools = ">=77.0.3,<81.0.0"
numpy = ">=2.3,<2.4"
scipy = ">=1.17,<1.18"
h5py = "*"
numba = "==0.62.1"
llvmlite = "==0.45.1"
protobuf = ">=6.31.1,<7"
scikit-learn = "*"
matplotlib = "*"
pandas = "*"
pybind11 = "==3.0.1"
nomkl = "*"
libblas = { version = "*", build = "*openblas" }
openblas = "*"
libfaiss = { version = "==1.10.0", build = "cpu_openblas*" }
faiss = { version = "==1.10.0", build = "cpu_openblas_py312*" }
faiss-cpu = "==1.10.0"

[feature.yubo.target.linux-64.dependencies]
c-compiler = "*"
cxx-compiler = "*"
swig = "*"
rust = "*"
patchelf = "*"
cuda-toolkit = "12.8.*"
cuda-nvcc = "12.8.*"
cuda-cudart-dev = "12.8.*"
ninja = "*"
cmake = "*"
gxx_linux-64 = "*"

[feature.yubo.target.osx-arm64.dependencies]
python = "3.13.*"
faiss = { version = "==1.10.0", build = "cpu_openblas_py313*" }
dm-control = ">=1.0.41"
mujoco = ">=3.8.1,<3.9"
fsspec = "<=2025.10.0"
c-compiler = "*"
cxx-compiler = "*"
ninja = "*"
cmake = "*"
rust = "*"

[feature.yubo.activation.env]
XLA_PYTHON_CLIENT_PREALLOCATE = "false"
HF_HOME = "${HOME}/.cache/yubo/hyperscalees"
HF_HUB_CACHE = "${HOME}/.cache/yubo/hyperscalees"

[feature.yubo.target.linux-64.activation.env]
CUDA_HOME = "$CONDA_PREFIX"
CUDACXX = "$CONDA_PREFIX/bin/nvcc"
TORCH_CUDA_ARCH_LIST = "8.9"
# ennbo's prebuilt Rust extension resolves cblas at load time (no DT_NEEDED on libopenblas).
LD_LIBRARY_PATH = "$CONDA_PREFIX/lib:/usr/lib/x86_64-linux-gnu${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"

[feature.yubo.target.osx-arm64.activation.env]
JAX_PLATFORMS = "mps,cpu"
KMP_DUPLICATE_LIB_OK = "TRUE"
OMP_NUM_THREADS = "1"
MKL_NUM_THREADS = "1"
OPENBLAS_NUM_THREADS = "1"
VECLIB_MAXIMUM_THREADS = "1"
DYLD_LIBRARY_PATH = "$CONDA_PREFIX/lib${DYLD_LIBRARY_PATH:+:$DYLD_LIBRARY_PATH}"
PYTHONPATH = "${PIXI_PROJECT_ROOT}${PYTHONPATH:+:${PYTHONPATH}}"

[feature.yubo.pypi-options]
extra-index-urls = ["https://pypi.nvidia.com"]
no-build-isolation = ["pyvecch"]
index-strategy = "unsafe-best-match"

[feature.yubo.pypi-dependencies]
click = "*"
gymnasium = { version = "==1.2.1", extras = ["box2d"] }
tyro = "*"
tqdm = "*"
huggingface-hub = "==0.36.2"
tokenizers = "*"
einops = "*"
importlib-resources = "*"
pyrwkv-tokenizer = "*"
hydra-core = "*"
fire = "*"
jupyter = "*"
rich = "==15.0.0"
reasoning-gym = "*"
math-verify = { version = "==0.9.0", extras = ["antlr4_9_3"] }
antlr4-python3-runtime = "==4.9.3"
verifiers = { git = "https://github.com/PrimeIntellect-ai/verifiers.git" }
gsm8k = { git = "https://github.com/PrimeIntellect-ai/verifiers.git", subdirectory = "environments/gsm8k" }
renderers = "*"
peft = "==0.18.0"
transformers = "==4.57.1"
accelerate = "==1.11.0"
safetensors = "==0.6.2"
datasets = "==4.4.1"
pylatexenc = "==2.10"
nest-asyncio = "*"
wandb = "==0.23.0"
weave = "==0.52.33"
openai = "==2.24.0"
openai-agents = "==0.10.5"
pydantic = ">=2.12.2,<3"
aiohttp = ">=3.13.3"
jinja2 = ">=3.1.6"
botorch = "==0.12.0"
gpytorch = "==1.13"
linear-operator = "==0.5.3"
cma = "==4.0.0"
celer = "*"
optuna = "==4.0.0"
smac = ">=2.4.0"
mujoco = ">=3.8.1,<3.9"
ax-platform = "*"
pyDOE = ">=0.3.8"
sparse-ho = { url = "https://github.com/QB3/sparse-ho/archive/master.zip" }
libsvmdata = "*"
craftax = "*"
jaxmarl = "*"
navix = "*"
tiktoken = "*"
rustbpe = "*"
kernels = "*"
pytest = "==8.3.4"
pytest-testmon = "==2.2.0"
hyperscalees = { git = "https://github.com/ESHyperscale/HyperscaleES.git", rev = "b77f7d6f91238fd575313e946b9cad21e0a74b32" }
modal = "==1.3.0.post1"
torchvision = ">=0.16.0"
absl-py = "==2.4.0"
chex = ">=0.1.91"
dm-env = "==1.6"
esquilax = "==2.1.0"
jax-tqdm = "==0.4.0"
etils = "==1.12.2"
flask = "==3.1.3"
flask-cors = "==6.0.2"
flax = ">=0.8.0"
jaxopt = ">=0.8.0"
ml-collections = "==1.1.0"
mujoco-mjx = "==3.8.0"
optax = ">=0.2.0"
orbax-checkpoint = ">=0.11.0"
tensorboardx = "==2.6.5"
trimesh = "==4.12.2"
jumanji = "==1.1.1"
warp-lang = "==1.13.0"
mujoco-warp = "==3.8.0.3"
imageio = "==2.37.3"
imageio-ffmpeg = "*"
networkx = "==3.6.1"
pygame = "==2.6.1"
rlax = ">=0.1.0"
seaborn = "==0.13.2"
brax = "==0.14.2"
omegaconf = "*"

[feature.yubo.target.linux-64.pypi-dependencies]
jax = { version = "==0.8.1", extras = ["cuda12"] }
kinetix-env = "==3.0.0"
grpclib = ">=0.4.7,<0.5"
ray = "==2.51.1"
torchrl = "==0.11.0"
tensordict = "==0.11.0"
joblib = "*"
threadpoolctl = "*"
dm-control = ">=1.0.41"
mediapy = "*"
playground = { git = "https://github.com/google-deepmind/mujoco_playground.git" }
pyvecch = { git = "https://github.com/feji3769/VecchiaBO.git", subdirectory = "code" }

[feature.yubo.target.osx-arm64.pypi-dependencies]
jax = "==0.10.0"
jax-mps = "==0.10.1"
torch = "==2.11.0"
ray = "==2.51.1"
modal = "==1.3.0.post1"
grpclib = ">=0.4.7,<0.5"
torchrl = "==0.11.0"
tensordict = "==0.11.0"
joblib = "*"
threadpoolctl = "*"
lxml = "*"
absl-py = "==2.4.0"
chex = "*"
dm-env = "==1.6"
esquilax = "*"
jax-tqdm = "==0.4.0"
etils = "==1.12.2"
flask = "==3.1.3"
flask-cors = "==6.0.2"
flax = "*"
jaxopt = "==0.8.5"
ml-collections = "==1.1.0"
mujoco-mjx = "==3.8.0"
optax = "*"
orbax-checkpoint = "*"
pillow = "==12.2.0"
tensorboardx = "==2.6.5"
trimesh = "==4.12.2"
jumanji = "==1.1.1"
imageio = "==2.37.3"
networkx = "==3.6.1"
pygame = "==2.6.1"
rlax = "==0.1.8"
seaborn = "==0.13.2"
mediapy = "*"
playground = { git = "https://github.com/google-deepmind/mujoco_playground.git" }
pyvecch = { git = "https://github.com/feji3769/VecchiaBO.git", subdirectory = "code" }

[feature.yubo.tasks]
setup = { depends-on = ["_setup-platform"], cmd = "echo setup ok" }
check = { depends-on = ["setup"], cmd = "python admin/check_pixi_env.py" }
test = "pytest"
kiss = "kiss check"

[feature.yubo.tasks._setup-lassobench]
cmd = '''bash -c 'set -euo pipefail
if ! python -c "import LassoBench" >/dev/null 2>&1; then
  python -m pip install --disable-pip-version-check --no-deps "LassoBench @ git+https://github.com/ksehic/LassoBench.git"
fi
python -c "import LassoBench"
'
'''

[feature.yubo.tasks._setup-menagerie]
cmd = '''bash -c 'set -euo pipefail
project="${PIXI_PROJECT_ROOT:-${PWD}}"
env_name="${PIXI_ENVIRONMENT_NAME:?PIXI_ENVIRONMENT_NAME must be set}"
state_dir="${project}/.pixi-state/${env_name}/{{ pixi.platform }}"
marker="${state_dir}/menagerie"
mkdir -p "${state_dir}"
if [[ -f "${marker}" ]]; then
  exit 0
fi
python - <<\PY
from mujoco_playground._src import mjx_env

mjx_env.ensure_menagerie_exists()
print("menagerie ok")
PY
touch "${marker}"
'
'''

[feature.yubo.tasks._setup-runtime-pins]
cmd = '''bash -c 'set -euo pipefail
project="${PIXI_PROJECT_ROOT:-${PWD}}"
env_name="${PIXI_ENVIRONMENT_NAME:?PIXI_ENVIRONMENT_NAME must be set}"
state_dir="${project}/.pixi-state/${env_name}/{{ pixi.platform }}"
marker="${state_dir}/runtime-pins"
mkdir -p "${state_dir}"
if [[ -f "${marker}" ]] && python - <<\PY
import importlib.metadata as m

assert m.version("numpy").startswith("2.3."), m.version("numpy")
assert m.version("numba") == "0.62.1", m.version("numba")
assert m.version("llvmlite") == "0.45.1", m.version("llvmlite")
PY
then
  exit 0
fi
python -m pip install --disable-pip-version-check --force-reinstall --no-deps \
  "numpy>=2.3,<2.4" numba==0.62.1 llvmlite==0.45.1
python - <<\PY
import numba
import numpy

print("runtime pins ok", numpy.__version__, numba.__version__)
PY
touch "${marker}"
'
'''

[feature.yubo.target.linux-64.tasks._setup-platform]
depends-on = [
  "_setup-linux-patch-enn-openblas",
  "_setup-lassobench",
  "_setup-menagerie",
  "_setup-runtime-pins",
]
cmd = "echo linux setup ok"

[feature.yubo.target.linux-64.tasks._setup-linux-vllm]
cmd = "python -m pip install --disable-pip-version-check --only-binary=:all: vllm==0.17.0"

[feature.yubo.target.linux-64.tasks._setup-linux-ennbo]
depends-on = ["_setup-linux-vllm"]
inputs = ["admin/patch_enn_failure_tolerance_dim.py"]
cmd = '''bash -c 'set -euo pipefail
project="${PIXI_PROJECT_ROOT:-${PWD}}"
env_name="${PIXI_ENVIRONMENT_NAME:?PIXI_ENVIRONMENT_NAME must be set}"
state_dir="${project}/.pixi-state/${env_name}/{{ pixi.platform }}"
mkdir -p "${state_dir}"
cd "${project}"
py="${CONDA_PREFIX}/bin/python"
export PATH="${CONDA_PREFIX}/bin:${PATH}"
export CC="/usr/bin/gcc"
export CXX="/usr/bin/g++"
export CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER="/usr/bin/gcc"
export LIBRARY_PATH="${CONDA_PREFIX}/lib:/usr/lib/x86_64-linux-gnu${LIBRARY_PATH:+:${LIBRARY_PATH}}"
export LD_LIBRARY_PATH="${CONDA_PREFIX}/lib:/usr/lib/x86_64-linux-gnu${LD_LIBRARY_PATH:+:${LD_LIBRARY_PATH}}"
export CMAKE_LIBRARY_PATH="${CONDA_PREFIX}/lib:/usr/lib/x86_64-linux-gnu${CMAKE_LIBRARY_PATH:+:${CMAKE_LIBRARY_PATH}}"
tmp="$(mktemp -d)"
trap "rm -rf \"${tmp}\"" EXIT
enn_ref="${ENNBO_REF:-main}"
git clone --filter=blob:none https://github.com/yubo-research/enn.git "${tmp}/enn"
if ! git -C "${tmp}/enn" checkout -q "${enn_ref}" 2>/dev/null; then
  git -C "${tmp}/enn" fetch --depth 1 origin "${enn_ref}"
  git -C "${tmp}/enn" checkout -q FETCH_HEAD
fi
src="${tmp}/enn"
resolved_ref="$(git -C "${src}" rev-parse HEAD)"
source_version="$("${py}" - "${src}/pyproject.toml" <<\PY
from pathlib import Path
import re
import sys

text = Path(sys.argv[1]).read_text(encoding="utf-8")
match = re.search(r"^version = \"([^\"]+)\"", text, re.M)
version = match.group(1) if match else ""
if not version:
    raise SystemExit("could not read ennbo version from pyproject.toml")
print(version)
PY
)"
marker="${state_dir}/ennbo-${source_version}-github-${resolved_ref}-patched"
if [[ -f "${marker}" ]] && "${py}" - "${source_version}" "${resolved_ref}" <<\PY
import importlib.metadata as m
import sys
import joblib
import threadpoolctl
from enn.enn.enn_class import EpistemicNearestNeighbors

assert m.version("ennbo") == sys.argv[1], m.version("ennbo")
print("ennbo ok", m.version("ennbo"), "source", sys.argv[2], EpistemicNearestNeighbors.__name__, joblib.__version__, threadpoolctl.__version__)
PY
then
  exit 0
fi
"${py}" -m pip install --disable-pip-version-check --no-deps joblib threadpoolctl
if ! command -v cargo >/dev/null 2>&1; then
  echo "cargo is required to build ennbo from yubo-research/enn." >&2
  exit 1
fi
"${py}" admin/patch_enn_failure_tolerance_dim.py "${src}"
"${py}" -m pip install --disable-pip-version-check --no-build-isolation --no-deps --force-reinstall "${src}"
"${py}" - "${source_version}" "${resolved_ref}" <<\PY
import importlib.metadata as m
import sys
import joblib
import threadpoolctl
from enn.enn.enn_class import EpistemicNearestNeighbors

assert m.version("ennbo") == sys.argv[1], m.version("ennbo")
print("ennbo ok", m.version("ennbo"), "source", sys.argv[2], EpistemicNearestNeighbors.__name__, joblib.__version__, threadpoolctl.__version__)
PY
touch "${marker}"
'
'''

[feature.yubo.target.linux-64.tasks._setup-linux-patch-enn-openblas]
depends-on = ["_setup-linux-ennbo"]
cmd = '''bash -c 'set -euo pipefail
project="${PIXI_PROJECT_ROOT:-${PWD}}"
env_name="${PIXI_ENVIRONMENT_NAME:?PIXI_ENVIRONMENT_NAME must be set}"
state_dir="${project}/.pixi-state/${env_name}/{{ pixi.platform }}"
marker="${state_dir}/enn-openblas"
mkdir -p "${state_dir}"
cd "${project}"
so="$(python - <<\PY
import glob
import os
import enn

print(glob.glob(os.path.join(os.path.dirname(enn.__file__), "enn_rust*.so"))[0])
PY
)"
if patchelf --print-needed "${so}" | grep -qx "libopenblas.so.0"; then
  echo "enn_rust already links libopenblas.so.0"
else
  patchelf --add-needed libopenblas.so.0 "${so}"
fi
LD_LIBRARY_PATH="${CONDA_PREFIX}/lib:/usr/lib/x86_64-linux-gnu${LD_LIBRARY_PATH:+:${LD_LIBRARY_PATH}}" \
  python - <<\PY
import faiss
from enn.enn.enn_class import EpistemicNearestNeighbors

print("enn openblas ok", faiss.__version__, EpistemicNearestNeighbors.__name__)
PY
touch "${marker}"
'
'''

[feature.yubo.target.osx-arm64.tasks]
extras-mac = { depends-on = [
  "_setup-mac-ennbo",
  "_setup-lassobench",
  "_setup-menagerie",
], cmd = "echo mac extras ok" }
llm-mac = { depends-on = ["_setup-mac-llm"], cmd = "echo mac llm ok" }
menagerie = { depends-on = ["_setup-menagerie"], cmd = "echo menagerie ok" }
check = { depends-on = [
  "setup",
], cmd = "JAX_PLATFORMS=mps python admin/check_pixi_env.py --require-llm" }
check-mac = { depends-on = [
  "extras-mac",
], cmd = "JAX_PLATFORMS=mps python admin/check_pixi_env.py" }
check-mac-llm = { depends-on = [
  "llm-mac",
], cmd = "JAX_PLATFORMS=mps python admin/check_pixi_env.py --require-llm" }
bootstrap-mac = { depends-on = [
  "check-mac-llm",
], cmd = "echo mac bootstrap ok" }

[feature.yubo.target.osx-arm64.tasks._setup-platform]
depends-on = ["_setup-mac-llm"]
cmd = "echo mac setup ok"

[feature.yubo.target.osx-arm64.tasks._setup-mac-ennbo]
inputs = ["admin/patch_enn_failure_tolerance_dim.py"]
cmd = '''bash -c 'set -euo pipefail
project="${PIXI_PROJECT_ROOT:-${PWD}}"
env_name="${PIXI_ENVIRONMENT_NAME:?PIXI_ENVIRONMENT_NAME must be set}"
state_dir="${project}/.pixi-state/${env_name}/{{ pixi.platform }}"
mkdir -p "${state_dir}"
cd "${project}"
py="${CONDA_PREFIX:?CONDA_PREFIX must be set}/bin/python"
tmp="$(mktemp -d)"
trap "rm -rf \"${tmp}\"" EXIT
enn_ref="${ENNBO_REF:-main}"
git clone --filter=blob:none --depth 1 https://github.com/yubo-research/enn.git "${tmp}/enn"
if ! git -C "${tmp}/enn" checkout -q "${enn_ref}" 2>/dev/null; then
  git -C "${tmp}/enn" fetch --depth 1 origin "${enn_ref}"
  git -C "${tmp}/enn" checkout -q FETCH_HEAD
fi
src="${tmp}/enn"
resolved_ref="$(git -C "${src}" rev-parse HEAD)"
source_version="$("${py}" - "${src}/pyproject.toml" <<\PY
from pathlib import Path
import re
import sys

text = Path(sys.argv[1]).read_text(encoding="utf-8")
match = re.search(r"^version = \"([^\"]+)\"", text, re.M)
version = match.group(1) if match else ""
if not version:
    raise SystemExit("could not read ennbo version from pyproject.toml")
print(version)
PY
)"
marker="${state_dir}/ennbo-${source_version}-github-${resolved_ref}-patched"
if [[ -f "${marker}" ]] && "${py}" - "${source_version}" "${resolved_ref}" <<\PY
import importlib.metadata as m
import sys
import faiss
from enn.enn.enn_class import EpistemicNearestNeighbors

assert m.version("ennbo") == sys.argv[1], m.version("ennbo")
print("ennbo ok", m.version("ennbo"), "source", sys.argv[2], faiss.__version__, EpistemicNearestNeighbors.__name__)
PY
then
  exit 0
fi
if ! command -v brew >/dev/null 2>&1; then
  echo "Homebrew is required to link enn_rust on macOS (build-time only)." >&2
  exit 1
fi
if ! command -v cargo >/dev/null 2>&1; then
  echo "cargo not on PATH; install Rust or use the Pixi rust dependency." >&2
  exit 1
fi
brew list faiss >/dev/null 2>&1 || brew install faiss
brew list libomp >/dev/null 2>&1 || brew install libomp
"${py}" -m pip install --disable-pip-version-check -q maturin "delocate>=0.13"
if grep -q "auditwheel = \"repair\"" "${src}/pyproject.toml"; then
  sed -i "" "s/auditwheel = \"repair\"/auditwheel = \"skip\"/" "${src}/pyproject.toml"
fi
"${py}" admin/patch_enn_failure_tolerance_dim.py "${src}"
py_tag="$("${py}" -c "import sys; print(\"cp%d%d\" % (sys.version_info.major, sys.version_info.minor))")"
export MACOSX_DEPLOYMENT_TARGET="${MACOSX_DEPLOYMENT_TARGET:-26.0}"
export CPPFLAGS="-I/opt/homebrew/include"
export LDFLAGS="-L/opt/homebrew/lib"
export PKG_CONFIG_PATH="/opt/homebrew/lib/pkgconfig"
export DYLD_FALLBACK_LIBRARY_PATH="/opt/homebrew/lib"
rm -rf "${src}/dist"
mkdir -p "${src}/dist/raw" "${src}/dist/repaired"
(
  cd "${src}"
  "${py}" -m maturin build --release --interpreter "${py}" --auditwheel skip --out dist/raw
  delocate-wheel -w dist/repaired -v dist/raw/*"${py_tag}"*.whl
)
"${py}" -m pip install --disable-pip-version-check --no-deps --force-reinstall "${src}/dist/repaired"/*"${py_tag}"*.whl
"${py}" -m pip install --disable-pip-version-check --no-deps \
  tensordict==0.11.0 torchrl==0.11.0 pyvers==0.2.2 joblib threadpoolctl
"${py}" - "${source_version}" "${resolved_ref}" <<\PY
import importlib.metadata as m
import sys
import faiss
from enn.enn.enn_class import EpistemicNearestNeighbors

assert m.version("ennbo") == sys.argv[1], m.version("ennbo")
print("ennbo ok", m.version("ennbo"), "source", sys.argv[2], faiss.__version__, EpistemicNearestNeighbors.__name__)
PY
touch "${marker}"
'
'''

[feature.yubo.target.osx-arm64.tasks._setup-mac-repair-faiss]
cmd = '''bash -c 'set -euo pipefail
project="${PIXI_PROJECT_ROOT:-${PWD}}"
env_name="${PIXI_ENVIRONMENT_NAME:?PIXI_ENVIRONMENT_NAME must be set}"
state_dir="${project}/.pixi-state/${env_name}/{{ pixi.platform }}"
marker="${state_dir}/faiss-1.10.0"
mkdir -p "${state_dir}"
py="${CONDA_PREFIX}/bin/python"
if [[ -f "${marker}" ]] && "${py}" - <<\PY
import faiss

assert faiss.__version__ == "1.10.0", faiss.__version__
PY
then
  exit 0
fi
if "${py}" -m pip show faiss-cpu >/dev/null 2>&1; then
  faiss_cpu_ver="$("${py}" -m pip show faiss-cpu | awk -F": " "/^Version:/{print \$2; exit}")"
  if [[ "${faiss_cpu_ver}" != "1.10.0" ]]; then
    echo "removing pip faiss-cpu ${faiss_cpu_ver}; conda faiss 1.10 is required" >&2
    "${py}" -m pip uninstall -y faiss-cpu faiss 2>/dev/null || true
    pixi reinstall -e "${env_name}" faiss faiss-cpu libfaiss
  fi
fi
"${py}" - <<\PY
import faiss

assert faiss.__version__ == "1.10.0", faiss.__version__
print("faiss ok", faiss.__version__)
PY
touch "${marker}"
'
'''

[feature.yubo.target.osx-arm64.tasks._setup-mac-llm]
depends-on = ["_setup-mac-ennbo", "_setup-lassobench", "_setup-menagerie"]
cmd = '''bash -c 'set -euo pipefail
project="${PIXI_PROJECT_ROOT:-${PWD}}"
env_name="${PIXI_ENVIRONMENT_NAME:?PIXI_ENVIRONMENT_NAME must be set}"
state_dir="${project}/.pixi-state/${env_name}/{{ pixi.platform }}"
marker="${state_dir}/vllm-metal-0.21.0-v0.2.0-20260528-103004"
mkdir -p "${state_dir}"
py="${CONDA_PREFIX}/bin/python"
if [[ -f "${marker}" ]] && "${py}" - <<\PY
import faiss
import importlib.metadata as m
import vllm
import vllm_metal  # noqa: F401

assert faiss.__version__ == "1.10.0", faiss.__version__
assert m.version("numpy").startswith("2.3."), m.version("numpy")
assert m.version("numba") == "0.62.1", m.version("numba")
assert m.version("llvmlite") == "0.45.1", m.version("llvmlite")
print("vllm-metal ok", vllm.__version__, "faiss", faiss.__version__)
PY
then
  exit 0
fi
machine="$("${py}" -c "import platform; print(platform.machine())")"
if [[ "${machine}" != "arm64" ]]; then
  echo "native arm64 Python is required for vllm-metal; got ${machine}" >&2
  exit 1
fi
if ! command -v cargo >/dev/null 2>&1; then
  echo "cargo not on PATH; install Rust or use the Pixi rust dependency." >&2
  exit 1
fi
"${py}" -m pip install --disable-pip-version-check \
  "mlx>=0.31.0,<0.32.0" \
  "mlx-lm>=0.31.3" \
  "mlx-vlm>=0.4.0,<0.5.0" \
  "transformers>=5.5.1" \
  "accelerate>=0.26.0" \
  "safetensors>=0.4.0" \
  "nanobind==2.10.2" \
  "maturin>=1.4,<2.0" \
  ninja
tmp="$(mktemp -d)"
trap "rm -rf \"${tmp}\"" EXIT
cd "${tmp}"
curl -fL --progress-bar -o vllm-0.21.0.tar.gz \
  https://github.com/vllm-project/vllm/releases/download/v0.21.0/vllm-0.21.0.tar.gz
tar xf vllm-0.21.0.tar.gz
cd vllm-0.21.0
"${py}" -m pip install --disable-pip-version-check -r requirements/cpu.txt --extra-index-url https://download.pytorch.org/whl/cpu
CXXFLAGS="-Wno-parentheses" "${py}" -m pip install --disable-pip-version-check .
cd "${tmp}"
curl -fL --progress-bar -o vllm-metal.tar.gz \
  https://github.com/vllm-project/vllm-metal/archive/refs/tags/v0.2.0-20260528-103004.tar.gz
tar xf vllm-metal.tar.gz
cd vllm-metal-0.2.0-20260528-103004
"${py}" -m pip install --disable-pip-version-check .
"${py}" -m pip install --disable-pip-version-check --force-reinstall --no-deps \
  "numpy>=2.3,<2.4" numba==0.62.1 llvmlite==0.45.1
"${py}" -m pip uninstall -y faiss-cpu faiss 2>/dev/null || true
pixi reinstall -e "${env_name}" faiss faiss-cpu libfaiss
"${py}" - <<\PY
import vllm
import vllm_metal  # noqa: F401
import faiss
import numba
import numpy

assert faiss.__version__ == "1.10.0", faiss.__version__
print("vllm-metal ok", vllm.__version__, "numpy", numpy.__version__, "numba", numba.__version__, "faiss", faiss.__version__)
PY
touch "${marker}"
'
'''

[feature.isaaclab.dependencies]
python = "3.12.*"
pip = "*"
git = "*"
git-lfs = "*"

[feature.isaaclab.pypi-options]
extra-index-urls = ["https://pypi.nvidia.com"]
index-strategy = "unsafe-best-match"

[feature.isaaclab.target.linux-64.pypi-dependencies]
warp-lang = "==1.12.0"
click = "*"
antlr4-python3-runtime = "==4.9.3"
gymnasium = "==1.2.1"
h5py = "*"
hydra-core = "*"
imageio = "==2.37.2"
imageio-ffmpeg = "*"
omegaconf = "*"
torchaudio = "==2.10.0"
torchrl = "==0.11.0"
tensordict = "==0.11.0"

[feature.isaaclab.tasks]
setup = { depends-on = ["_setup-torchaudio"], cmd = "echo isaaclab setup ok" }
install = { depends-on = ["setup"], cmd = "echo isaaclab install ok" }
check = { depends-on = [
  "setup",
], cmd = "python -c 'import importlib.util, gymnasium, tensordict, torchrl; mods=(\"isaacsim\", \"isaaclab\", \"isaaclab_assets\", \"isaaclab_newton\", \"isaaclab_physx\", \"isaaclab_tasks\"); missing=[m for m in mods if importlib.util.find_spec(m) is None]; assert not missing, missing; import isaaclab_tasks; from isaaclab_tasks.utils import parse_env_cfg; gymnasium.spec(\"Isaac-Velocity-Flat-G1-v0\"); parse_env_cfg(\"Isaac-Velocity-Flat-G1-v0\", num_envs=1, device=\"cpu\"); print(\"isaaclab ok\", torchrl.__version__, tensordict.__version__)'" }

[feature.isaaclab.tasks._setup-pip]
cmd = '''bash -c 'set -euo pipefail
project="${PIXI_PROJECT_ROOT:-${PWD}}"
env_name="${PIXI_ENVIRONMENT_NAME:?PIXI_ENVIRONMENT_NAME must be set}"
state_dir="${project}/.pixi-state/${env_name}/{{ pixi.platform }}"
marker="${state_dir}/pip"
mkdir -p "${state_dir}"
cd "${project}"
py="${CONDA_PREFIX}/bin/python"
if [[ -f "${marker}" ]] && "${py}" - <<\PY
import importlib.metadata as m

major, minor, *_ = m.version("pip").split(".")
assert (int(major), int(minor)) >= (25, 1), m.version("pip")
print("pip ok", m.version("pip"))
PY
then
  exit 0
fi
"${py}" -m ensurepip --upgrade
"${py}" -m pip install --disable-pip-version-check --upgrade "pip>=25.1"
"${py}" -m pip --version
touch "${marker}"
'
'''

[feature.isaaclab.tasks._setup-isaacsim]
depends-on = ["_setup-pip"]
cmd = '''bash -c 'set -euo pipefail
project="${PIXI_PROJECT_ROOT:-${PWD}}"
env_name="${PIXI_ENVIRONMENT_NAME:?PIXI_ENVIRONMENT_NAME must be set}"
state_dir="${project}/.pixi-state/${env_name}/{{ pixi.platform }}"
marker="${state_dir}/isaacsim-6.0.0.0"
mkdir -p "${state_dir}"
cd "${project}"
py="${CONDA_PREFIX}/bin/python"
if [[ -f "${marker}" ]] && "${py}" - <<\PY
import importlib.metadata as m
import importlib.util

assert importlib.util.find_spec("isaacsim") is not None
assert m.version("isaacsim") == "6.0.0.0", m.version("isaacsim")
print("isaacsim ok", m.version("isaacsim"))
PY
then
  exit 0
fi
"${py}" -m pip install --disable-pip-version-check --extra-index-url https://pypi.nvidia.com \
  "isaacsim[all,extscache]==6.0.0.0"
"${py}" - <<\PY
import importlib.util

assert importlib.util.find_spec("isaacsim") is not None
print("isaacsim ok")
PY
touch "${marker}"
'
'''

[feature.isaaclab.tasks._setup-isaaclab-source]
depends-on = ["_setup-isaacsim"]
cmd = '''bash -c 'set -euo pipefail
project="${PIXI_PROJECT_ROOT:-${PWD}}"
env_name="${PIXI_ENVIRONMENT_NAME:?PIXI_ENVIRONMENT_NAME must be set}"
state_dir="${project}/.pixi-state/${env_name}/{{ pixi.platform }}"
marker="${state_dir}/isaaclab-v3.0.0-beta"
mkdir -p "${state_dir}"
cd "${project}"
py="${CONDA_PREFIX}/bin/python"
if [[ -f "${marker}" ]] && "${py}" - <<\PY
import importlib.util

mods = ("isaaclab", "isaaclab_assets", "isaaclab_newton", "isaaclab_physx", "isaaclab_tasks")
missing = [m for m in mods if importlib.util.find_spec(m) is None]
assert not missing, missing
print("isaaclab source ok")
PY
then
  exit 0
fi
src_root="${PIXI_PROJECT_ROOT}/src"
src="${src_root}/IsaacLab"
mkdir -p "${src_root}"
if [[ -d "${src}/.git" ]]; then
  git -C "${src}" fetch --tags origin
else
  git clone https://github.com/isaac-sim/IsaacLab.git "${src}"
fi
git -C "${src}" checkout -q v3.0.0-beta
(
  cd "${src}"
  ./isaaclab.sh --install assets,tasks,newton
)
"${py}" - <<\PY
import importlib.util

mods = ("isaaclab", "isaaclab_assets", "isaaclab_newton", "isaaclab_physx", "isaaclab_tasks")
missing = [m for m in mods if importlib.util.find_spec(m) is None]
assert not missing, missing
print("isaaclab source ok")
PY
touch "${marker}"
'
'''

[feature.isaaclab.tasks._setup-torchaudio]
depends-on = ["_setup-isaaclab-source"]
cmd = '''bash -c 'set -euo pipefail
project="${PIXI_PROJECT_ROOT:-${PWD}}"
env_name="${PIXI_ENVIRONMENT_NAME:?PIXI_ENVIRONMENT_NAME must be set}"
state_dir="${project}/.pixi-state/${env_name}/{{ pixi.platform }}"
marker="${state_dir}/torchaudio-2.10.0"
mkdir -p "${state_dir}"
cd "${project}"
py="${CONDA_PREFIX}/bin/python"
if [[ -f "${marker}" ]] && "${py}" - <<\PY
import importlib.metadata as m
import torchaudio

assert m.version("torchaudio").startswith("2.10.0"), m.version("torchaudio")
print("torchaudio ok", torchaudio.__version__)
PY
then
  exit 0
fi
"${py}" -m pip install --disable-pip-version-check --index-url https://download.pytorch.org/whl/cu128 torchaudio==2.10.0
"${py}" - <<\PY
import torchaudio

print("torchaudio ok", torchaudio.__version__)
PY
touch "${marker}"
'
'''

[environments]
yubo = { features = ["yubo"], no-default-feature = true }
isaaclab = { features = ["isaaclab"], no-default-feature = true }
