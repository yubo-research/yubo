libsvmdata = "*"
craftax = "*"
jaxmarl = "*"
navix = "*"
tiktoken = "*"
rustbpe = "*"
kernels = "*"
pytest = "==8.3.4"
pytest-testmon = "==2.2.0"
hyperscalees = { git = "https://github.com/ESHyperscale/HyperscaleES.git", rev = "b77f7d6f91238fd575313e946b9cad21e0a74b32" }
modal = "==1.3.0.post1"
torchvision = ">=0.16.0"
absl-py = "==2.4.0"
chex = ">=0.1.91"
dm-env = "==1.6"
esquilax = "==2.1.0"
jax-tqdm = "==0.4.0"
etils = "==1.14.0"
flask = "==3.1.3"
flask-cors = "==6.0.2"
flax = ">=0.8.0"
jaxopt = ">=0.8.0"
ml-collections = "==1.1.0"
