[rl]
algo = "mjx_ppo"

[rl.mjx_ppo]
exp_dir = "runs/rl/mjx/brax_ant_ppo_smoke"
env_tag = "brax:ant"
seed = 0
hidden_size = 64
log_interval = 1

[rl.mjx_ppo.collector]
total_frames = 65536
num_envs = 256
num_steps = 16

[rl.mjx_ppo.optim]
lr = 3e-4
minibatch_size = 2048
num_epochs = 4
max_grad_norm = 0.5

[rl.mjx_ppo.loss]
gamma = 0.99
gae_lambda = 0.95
clip_epsilon = 0.2
entropy_coeff = 0.0
critic_coeff = 0.5

[rl.run]
num_reps = 1
workers = 1
