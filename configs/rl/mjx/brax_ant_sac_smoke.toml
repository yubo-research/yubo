[rl]
algo = "mjx_sac"

[rl.mjx_sac]
exp_dir = "runs/rl/mjx/brax_ant_sac_smoke"
env_tag = "brax:ant"
seed = 0
hidden_size = 64
log_interval = 1

[rl.mjx_sac.collector]
total_frames = 65536
num_envs = 256
num_steps = 1
replay_size = 65536
batch_size = 2048
updates_per_iter = 1

[rl.mjx_sac.optim]
lr_actor = 3e-4
lr_critic = 3e-4
lr_alpha = 3e-4

[rl.mjx_sac.loss]
gamma = 0.99
tau = 0.005
alpha_init = 0.2

[rl.run]
num_reps = 1
workers = 1
