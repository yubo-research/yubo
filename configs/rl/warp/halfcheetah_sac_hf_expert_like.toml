# HalfCheetah-v5 SAC Expert (TorchRL + MuJoCo Warp).
# Replicates the Farama-Minari expert baseline hyperparameters where supported.
#
# HF Source: https://huggingface.co/farama-minari/HalfCheetah-v5-SAC-expert
#
# Run:
#   ./ops/rl.py local configs/rl/warp/halfcheetah_sac_hf_expert_like.toml

[rl]
algo = "sac"

[rl.sac]
exp_dir = "runs/rl/warp/halfcheetah_sac_hf_expert_like"
# `warp:` is a TorchRL/native-collector env tag, not a JAX/MJX env tag.
env_tag = "warp:gymnasium:HalfCheetah-v5"
policy_tag = "mlp-256-256"
device = "cuda"
log_interval_steps = 10000

[rl.sac.collector]
total_frames = 3000000
num_envs = 1024
frames_per_batch = 1024
init_random_frames = 10000

[rl.sac.replay_buffer]
size = 1000000
batch_size = 1024

[rl.sac.optim]
actor_lr = 3e-4
qvalue_lr = 3e-4
alpha_lr = 3e-4
update_every = 1
optim_steps_per_batch = 128

[rl.sac.loss]
gamma = 0.99
alpha_init = 0.2
target_entropy = -6.0

[rl.sac.target_net_updater]
tau = 0.005

[rl.sac.eval]
interval_steps = 50000
seed_base = 2000

[rl.sac.checkpoint]
interval_steps = 200000

[rl.run]
num_reps = 1
workers = 1

[rl.run.artifacts.video]
enable = true
