# Quadruped Run SAC (PufferLib backend) for macOS.
# Run:
#   python -m rl.runner --config configs/rl/dm_control/quadruped/sac_puffer_quadruped_run_sota_like_macos.toml

[rl]
algo = "sac"
backend = "pufferlib"

[rl.sac]
exp_dir = "_tmp/dm_control/quadruped/sac_puffer_quadruped_run_sota_like_macos"
env_tag = "quadruped-run-64x64"
device = "cpu"

# Shared SAC core hyperparameters.
total_timesteps = 3000000
learning_rate_actor = 3e-4
learning_rate_critic = 3e-4
learning_rate_alpha = 3e-4
gamma = 0.99
tau = 0.005
batch_size = 256
replay_size = 1000000
replay_backend = "auto"
learning_starts = 10000
update_every = 1
updates_per_step = 1
alpha_init = 0.2

# Platform/runtime tuning (macOS stability).
num_envs = 1
vector_backend = "serial"
vector_overwork = false
framestack = 1

# Architecture is resolved from problems/env_conf.py for env_tag = "quadruped-run-64x64".

log_interval_steps = 1000

# Eval block.
eval_interval_steps = 10000
num_denoise = 1
num_denoise_passive = 1
eval_seed_base = 1000
eval_noise_mode = "frozen"
checkpoint_interval_steps = 200000

video_enable = true

[rl.run]
num_reps = 10
workers = 1
