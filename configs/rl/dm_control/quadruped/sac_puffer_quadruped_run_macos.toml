
[rl]
algo = "sac"
backend = "pufferlib"

[rl.sac]
exp_dir = "_tmp/dm_control/quadruped/sac_puffer_quadruped_run_macos"
env_tag = "dm_control/quadruped-run-v0"
policy_tag = "mlp-64-64"

total_timesteps = 3000000
learning_rate_actor = 3e-4
learning_rate_critic = 3e-4
learning_rate_alpha = 3e-4
gamma = 0.99
tau = 0.005
batch_size = 256
replay_size = 1000000
replay_backend = "auto"
learning_starts = 10000
update_every = 1
updates_per_step = 1
alpha_init = 0.2

num_envs = 1
vector_backend = "serial"
vector_overwork = false
framestack = 1

log_interval_steps = 1000

eval_interval_steps = 10000
num_denoise = 1
num_denoise_passive = 1
eval_seed_base = 1000
eval_noise_mode = "frozen"
checkpoint_interval_steps = 200000

video_enable = true

[rl.run]
num_reps = 10
workers = 1
