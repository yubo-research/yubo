
[rl]
algo = "ppo"
backend = "pufferlib"

[rl.ppo]
exp_dir = "_tmp/dm_control/quadruped/ppo_puffer_quadruped_run_linux"
env_tag = "dm_control/quadruped-run-v0"

total_timesteps = 3000000
learning_rate = 3e-4
num_envs = 8
num_steps = 256
anneal_lr = true
gamma = 0.99
gae_lambda = 0.95
num_minibatches = 32
update_epochs = 10
norm_adv = true
clip_coef = 0.2
clip_vloss = true
ent_coef = 0.0
vf_coef = 0.5
max_grad_norm = 0.5

vector_backend = "multiprocessing"
vector_num_workers = 8
vector_batch_size = 8
vector_overwork = false
framestack = 1
pixels_only = true

eval_interval = 10
num_denoise = 1
num_denoise_passive = 1
eval_seed_base = 1000
eval_noise_mode = "frozen"
log_interval = 1
checkpoint_interval = 200

video_enable = true

[rl.run]
num_reps = 10
workers = 1
