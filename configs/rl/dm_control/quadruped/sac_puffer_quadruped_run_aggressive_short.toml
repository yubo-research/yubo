[rl]
algo = "sac"
backend = "pufferlib"

[rl.sac]
exp_dir = "_tmp/dm_control/quadruped/sac_puffer_quadruped_run_aggressive_short"
env_tag = "dm_control/quadruped-run-v0"

total_timesteps = 120000
learning_rate_actor = 3e-4
learning_rate_critic = 3e-4
learning_rate_alpha = 3e-4
gamma = 0.99
tau = 0.005
batch_size = 128
replay_size = 200000
replay_backend = "auto"
learning_starts = 2000
update_every = 1
updates_per_step = 1
alpha_init = 0.2

num_envs = 4
vector_backend = "multiprocessing"
vector_num_workers = 4
vector_batch_size = 4
vector_overwork = false
framestack = 1

log_interval_steps = 1000

eval_interval_steps = 5000
num_denoise = 1
num_denoise_passive = 1
eval_seed_base = 1000
eval_noise_mode = "frozen"
checkpoint_interval_steps = 25000

video_enable = false

[rl.run]
num_reps = 1
workers = 1
