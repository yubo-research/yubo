[rl]
algo = "mjx_ppo"

[rl.mjx_ppo]
exp_dir = "_tmp/test_ppo_eval"
env_tag = "gymnax:CartPole-v1"
seed = 0
hidden_size = 32
log_interval = 1

[rl.mjx_ppo.collector]
total_frames = 1000
num_envs = 10
num_steps = 10

[rl.mjx_ppo.eval]
interval = 1
num_envs = 4
num_steps = 200

[rl.mjx_ppo.checkpoint]
interval = 2
