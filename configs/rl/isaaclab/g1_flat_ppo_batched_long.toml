# Native TorchRL IsaacLab PPO batched-env longer run.
#
# Modal:
#   modal run ops/modal_pixi_setup.py --config configs/rl/isaaclab/g1_flat_ppo_batched_long.toml
#
# For isaaclab:* envs the runtime uses one native TorchRL IsaacLabWrapper
# collector. num_envs is IsaacLab's internal vectorized env count.

[rl]
algo = "ppo"

[rl.ppo]
exp_dir = "runs/rl/isaaclab/g1_flat_ppo_batched_long"
env_tag = "isaaclab:Isaac-Velocity-Flat-G1-v0"
policy_tag = "actor-critic-mlp-32-32"
device = "cuda"
from_pixels = false
pixels_only = true
log_interval = 5

[rl.ppo.collector]
total_frames = 4194304
frames_per_batch = 32768
num_envs = 1024
backend = "auto"
single_env_backend = "auto"

[rl.ppo.optim]
lr = 1e-4
anneal_lr = true
minibatch_size = 8192
num_epochs = 2
max_grad_norm = 0.5

[rl.ppo.loss]
gamma = 0.99
gae_lambda = 0.95
normalize_advantage = true
clip_epsilon = 0.2
clip_value_loss = true
entropy_coeff = 0.0
critic_coeff = 0.5
target_kl = 0.02

[rl.ppo.eval]
# IsaacLab allows one active SimulationContext per process. Keep this run
# train-only for now; opening a second eval env during collection crashes.
interval = 1000000
num_denoise = 1
num_denoise_passive = 1
seed_base = 1000
noise_mode = "frozen"

[rl.ppo.checkpoint]
interval = 25

[rl.run]
num_reps = 1
workers = 1

[rl.run.artifacts.video]
enable = false
