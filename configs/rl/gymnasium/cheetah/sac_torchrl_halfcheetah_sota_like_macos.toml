# HalfCheetah-v5 SAC (TorchRL) for macOS.
# Run:
#   ./ops/rl.py local configs/rl/gymnasium/cheetah/sac_torchrl_halfcheetah_sota_like_macos.toml

[rl]
algo = "sac"

[rl.run]
num_reps = 10
workers = 1


[rl.sac]
exp_dir = "_tmp/gymnasium/cheetah/sac_torchrl_halfcheetah_sota_like_macos"
env_tag = "cheetah"
policy_tag = "mlp-32-16"
device = "cpu"
from_pixels = false
pixels_only = true
log_interval_steps = 1000

# Shared SAC core hyperparameters.
[rl.sac.collector]
total_frames = 1000000
num_envs = 1
frames_per_batch = 32
init_random_frames = 10000
backend = "single"
single_env_backend = "serial"

[rl.sac.replay_buffer]
size = 1000000
batch_size = 256

[rl.sac.optim]
actor_lr = 3e-4
qvalue_lr = 3e-4
alpha_lr = 3e-4
update_every = 1
optim_steps_per_batch = 1

[rl.sac.loss]
gamma = 0.99
alpha_init = 0.2
target_entropy = -6.0

[rl.sac.target_net_updater]
tau = 0.005

[rl.sac.eval]
interval_steps = 5000
num_denoise = 1
num_denoise_passive = 1
seed_base = 1000
noise_mode = "frozen"

[rl.sac.checkpoint]
interval_steps = 100000

[rl.run.artifacts.video]
enable = true
