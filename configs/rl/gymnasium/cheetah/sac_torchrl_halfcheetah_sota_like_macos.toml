# HalfCheetah-v5 SAC (TorchRL backend) for macOS.
# Run:
#   python -m rl.runner --config configs/rl/gymnasium/cheetah/sac_torchrl_halfcheetah_sota_like_macos.toml

[rl]
algo = "sac"
backend = "torchrl"

[rl.run]
num_reps = 10
workers = 1


[rl.sac]
exp_dir = "_tmp/gymnasium/cheetah/sac_torchrl_halfcheetah_sota_like_macos"
env_tag = "cheetah"
policy_tag = "mlp-32-16"
num_denoise = 1
num_denoise_passive = 1

# macOS stability profile.
device = "cpu"
collector_backend = "single"
single_env_backend = "serial"


# Shared SAC core hyperparameters.
total_timesteps = 1000000
num_envs = 1
frames_per_batch = 32
learning_rate_actor = 3e-4
learning_rate_critic = 3e-4
learning_rate_alpha = 3e-4
gamma = 0.99
tau = 0.005
batch_size = 256
replay_size = 1000000
learning_starts = 10000
update_every = 1
updates_per_step = 1
alpha_init = 0.2
target_entropy = -6.0



log_interval_steps = 1000


eval_interval_steps = 5000
eval_seed_base = 1000
eval_noise_mode = "frozen"
checkpoint_interval_steps = 100000

video_enable = true
