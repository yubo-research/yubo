# HalfCheetah-v5 SAC (TorchRL) for Linux CUDA.
# Run:
#   ./ops/rl.py local configs/rl/gymnasium/cheetah/sac_torchrl_halfcheetah_sota_like_linux.toml

[rl]
algo = "sac"

[rl.sac]
exp_dir = "_tmp/gymnasium/cheetah/sac_torchrl_halfcheetah_sota_like_linux"
env_tag = "cheetah"
policy_tag = "mlp-32-16"

# Linux CUDA runtime.
device = "cuda"
collector_backend = "multi_sync"
single_env_backend = "auto"
collector_workers = 8

from_pixels = false
pixels_only = true

# Shared SAC core hyperparameters.
total_timesteps = 1000448
num_envs = 8
frames_per_batch = 64
learning_rate_actor = 3e-4
learning_rate_critic = 3e-4
learning_rate_alpha = 3e-4
gamma = 0.99
tau = 0.005
batch_size = 256
replay_size = 1000000
replay_pin_memory = true
replay_prefetch = 2
learning_starts = 10240
update_every = 1
updates_per_step = 1
learner_update_chunk_size = 64
alpha_init = 0.2
target_entropy = -6.0

# Architecture is resolved from problems/env_conf.py for env_tag = "cheetah".

log_interval_steps = 1024

# Eval parity block (kept identical across halfcheetah SAC configs).
eval_interval_steps = 5120
num_denoise = 1
num_denoise_passive = 1
eval_seed_base = 1000
eval_noise_mode = "frozen"
checkpoint_interval_steps = 102400

[rl.run]
num_reps = 10
workers = 1

[rl.run.artifacts.video]
enable = true
