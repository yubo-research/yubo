# HalfCheetah-v5 SAC (TorchRL backend) for Linux CUDA.
# Hugging Face expert-like baseline (farama-minari/HalfCheetah-v5-SAC-expert).
# HF repo: https://huggingface.co/farama-minari/HalfCheetah-v5-SAC-expert
# HF config artifact: https://huggingface.co/farama-minari/HalfCheetah-v5-SAC-expert/raw/main/config.json
# Run:
#   python -m rl.runner --config configs/rl/gymnasium/cheetah/sac_torchrl_halfcheetah_hf_expert_like_linux.toml

[rl]
algo = "sac"
backend = "torchrl"

[rl.sac]
exp_dir = "_tmp/gymnasium/cheetah/sac_torchrl_halfcheetah_hf_expert_like_linux"
env_tag = "cheetah"
seed = 2

# Linux CUDA runtime.
device = "cuda"
collector_backend = "multi_sync"
single_env_backend = "auto"
collector_workers = 8

from_pixels = false
pixels_only = true

# HF expert-like SAC core hyperparameters.
total_timesteps = 3000000
num_envs = 8
frames_per_batch = 64
learning_rate_actor = 3e-4
learning_rate_critic = 3e-4
learning_rate_alpha = 3e-4
gamma = 0.99
tau = 0.005
batch_size = 256
replay_size = 1000000
learning_starts = 10000
update_every = 1
updates_per_step = 8
learner_update_chunk_size = 8
alpha_init = 0.2
target_entropy = -6.0

backbone_name = "mlp"
backbone_hidden_sizes = [256, 256]
backbone_activation = "relu"
backbone_layer_norm = false
actor_head_hidden_sizes = []
critic_head_hidden_sizes = []
head_activation = "relu"

log_interval_steps = 1000

# Eval block.
eval_interval_steps = 10000
num_denoise_eval = 1
num_denoise_passive_eval = 1
eval_seed_base = 1000
eval_noise_mode = "frozen"
checkpoint_interval_steps = 200000

video_enable = true
video_prefix = "sac_torchrl_halfcheetah_hf_expert_like_linux"
video_num_episodes = 5
video_num_video_episodes = 2
video_episode_selection = "best"
video_seed_base = 1000

[rl.run]
num_reps = 10
workers = 1
