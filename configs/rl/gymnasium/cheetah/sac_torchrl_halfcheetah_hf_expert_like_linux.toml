# HalfCheetah-v5 SAC (TorchRL) for Linux CUDA.
# Hugging Face expert-like baseline (farama-minari/HalfCheetah-v5-SAC-expert).
# HF repo: https://huggingface.co/farama-minari/HalfCheetah-v5-SAC-expert
# HF config artifact: https://huggingface.co/farama-minari/HalfCheetah-v5-SAC-expert/raw/main/config.json
# Run:
#   ./ops/rl.py local configs/rl/gymnasium/cheetah/sac_torchrl_halfcheetah_hf_expert_like_linux.toml

[rl]
algo = "sac"

[rl.sac]
exp_dir = "_tmp/gymnasium/cheetah/sac_torchrl_halfcheetah_hf_expert_like_linux"
env_tag = "cheetah"
policy_tag = "mlp-32-16"
device = "cuda"
from_pixels = false
pixels_only = true
log_interval_steps = 1000

# HF expert-like SAC core hyperparameters.
[rl.sac.collector]
total_frames = 3000000
num_envs = 8
frames_per_batch = 64
init_random_frames = 10000
backend = "multi_sync"
single_env_backend = "auto"
workers = 8

[rl.sac.replay_buffer]
size = 1000000
batch_size = 256
pin_memory = true
prefetch = 2

[rl.sac.optim]
actor_lr = 3e-4
qvalue_lr = 3e-4
alpha_lr = 3e-4
update_every = 1
optim_steps_per_batch = 8
learner_update_chunk_size = 8

[rl.sac.loss]
gamma = 0.99
alpha_init = 0.2
target_entropy = -6.0

[rl.sac.target_net_updater]
tau = 0.005

[rl.sac.eval]
interval_steps = 10000
num_denoise = 1
num_denoise_passive = 1
seed_base = 1000
noise_mode = "frozen"

[rl.sac.checkpoint]
interval_steps = 200000

[rl.run]
num_reps = 10
workers = 1

[rl.run.artifacts.video]
enable = true
