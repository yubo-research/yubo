# HalfCheetah-v5 SAC (PufferLib backend) for Linux CUDA.
# Run: python -m experiments.experiment local configs/rl/gymnasium/cheetah/sac_puffer_halfcheetah_sota_like_linux.toml

[experiment]
opt_name = "sac"
env_tag = "cheetah"
exp_dir = "_tmp/gymnasium/cheetah/sac_puffer_halfcheetah_sota_like_linux"
total_timesteps = 1000000
num_reps = 10
local_workers = 1
device = "cuda"

learning_rate_actor = 3e-4
learning_rate_critic = 3e-4
learning_rate_alpha = 3e-4
gamma = 0.99
tau = 0.005
batch_size = 256
replay_size = 1000000
replay_backend = "auto"
learning_starts = 10000
update_every = 1
updates_per_step = 1
alpha_init = 0.2
target_entropy = -6.0

num_envs = 8
frames_per_batch = 64
vector_backend = "multiprocessing"
vector_num_workers = 8
vector_batch_size = 8
vector_overwork = false
framestack = 1

log_interval_steps = 1000
eval_interval_steps = 5000
num_denoise = 1
num_denoise_passive = 1
eval_seed_base = 1000
eval_noise_mode = "frozen"
checkpoint_interval_steps = 100000

video_enable = true
