# UHDSimpleBE + log-uniform ("stagger") sigma sampling.
# Each candidate draws sigma ~ LogUniform(1e-5, 1e-1); ENN/UCB picks the best.

env_tag = "mnist_fulltrain_acc"
num_rounds = 1000
optimizer = "simple_be"
perturb = "dense"
log_interval = 10
accuracy_interval = 100

be_num_probes = 10
be_num_candidates = 30
be_warmup = 20
be_fit_interval = 10
be_enn_k = 10
be_sigma_range = [1e-5, 1e-1]
