# Run: ./ops/hyperscalees_llm.py local configs/pretrain/hyperscalees/general_do_evolution_fastzero_smoke.toml

[experiment]
exp_dir = "runs/yubo_hyperscalees/general_do_evolution_fastzero_smoke"
repo_dir = ".external/HyperscaleES"
log_file = "hyperscalees.log"
dry_run = false

[hyperscalees]
script = "general_do_evolution"

[args]
seed = 0
model_choice = "7w0.1B"
task = "fastzero"
noiser = "eggroll"
num_epochs = 1
parallel_generations_per_gpu = 4
generations_per_prompt = 2
thinking_length = 4
answer_length = 4
validate_every = 1
parallel_validations = 4
validation_iterations = 1
log_output_every = 1
output_directory = "runs/yubo_hyperscalees/general_do_evolution_fastzero_smoke/outputs"
wandb_directory = "runs/yubo_hyperscalees/general_do_evolution_fastzero_smoke"
wandb_mode = "offline"
wandb_name = "smoke"
track = false

[env.vars]
XLA_PYTHON_CLIENT_PREALLOCATE = "false"
