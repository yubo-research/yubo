# Run: ./ops/hyperscalees_llm.py local configs/pretrain/hyperscalees/paper/exact_asset_blocked/countdownn_7g1p5b_grpo.toml
# Paper: Table 11, GRPO on Countdown with RWKV 7g1.5B.
# Blocked: pinned upstream registry does not expose known-live 7g1.5B assets.

[experiment]
exp_dir = "runs/yubo_hyperscalees/paper/exact_asset_blocked/countdownn_7g1p5b_grpo"
repo_dir = ".external/HyperscaleES"
log_file = "hyperscalees.log"
dry_run = true

[hyperscalees]
script = "do_grpo"

[args]
seed = 0
model_choice = "7g1.5B"
task = "countdownn"
num_epochs = 100
parallel_generations_per_gpu = 64
generations_per_prompt = 8
generation_length = 1000
validate_every = 10
parallel_validations = 128
validation_iterations = 10
num_minibatches = 4
wandb_directory = "runs/yubo_hyperscalees/paper/exact_asset_blocked/countdownn_7g1p5b_grpo"
wandb_mode = "offline"
wandb_name = "countdownn_7g1p5b_grpo"
track = false

[env.vars]
XLA_PYTHON_CLIENT_PREALLOCATE = "false"
