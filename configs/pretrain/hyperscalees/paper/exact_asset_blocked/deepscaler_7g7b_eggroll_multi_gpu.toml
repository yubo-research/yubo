# Run: ./ops/hyperscalees_llm.py local configs/pretrain/hyperscalees/paper/exact_asset_blocked/deepscaler_7g7b_eggroll_multi_gpu.toml
# Paper: Figure 5b / Appendix N.3, RWKV 7g7B EGGROLL on DeepScaleR-style math reasoning.
# Blocked: pinned upstream registry does not expose known-live 7g7B assets.

[experiment]
exp_dir = "runs/yubo_hyperscalees/paper/exact_asset_blocked/deepscaler_7g7b_eggroll_multi_gpu"
repo_dir = ".external/HyperscaleES"
log_file = "hyperscalees.log"
dry_run = true

[hyperscalees]
script = "general_do_evolution_multi_gpu"

[args]
seed = 0
model_choice = "7g7B"
task = "deepscaler"
noiser = "eggroll"
num_epochs = 100
parallel_generations_per_gpu = 1024
generations_per_prompt = 512
thinking_length = 5000
answer_length = 5000
validate_every = 10
parallel_validations = 128
validation_iterations = 10
log_output_every = 10
output_directory = "runs/yubo_hyperscalees/paper/exact_asset_blocked/deepscaler_7g7b_eggroll_multi_gpu/outputs"
wandb_directory = "runs/yubo_hyperscalees/paper/exact_asset_blocked/deepscaler_7g7b_eggroll_multi_gpu"
wandb_mode = "offline"
wandb_name = "deepscaler_7g7b_eggroll_multi_gpu"
save_model = false
track = false

[env.vars]
XLA_PYTHON_CLIENT_PREALLOCATE = "false"
