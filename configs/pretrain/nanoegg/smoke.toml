# Run: python -m experiments.nanoegg_pretrain local configs/pretrain/nanoegg/smoke.toml

[experiment]
exp_dir = "runs/yubo_nanoegg/smoke"
repo_dir = ".external/nano-egg"
log_file = "nanoegg.log"
dry_run = false

[nanoegg]
seed = 0
dtype = "int8"
batch_size = 1
population_size = 2
num_epochs = 1
alpha = 4.0
sigma_shift = 4
use_clt = true
fast_fitness = true
alpha_decay_timestep = 1000
n_layer = 1
n_embd = 16
vocab_size = 256
noise_reuse = 1
tokens_per_update = 8
regenerate_model = true
track = false
validate_every = 0
validation_batch_size = 2

[data]
synthetic = true
seed = 0
train_bytes = 1024
valid_bytes = 1024
test_bytes = 1024
