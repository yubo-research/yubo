# Run:
# ./ops/exp_uhd.py local configs/uhd/nanochat/tinystories_d24_bszo_be_enn.toml
#
# ADVANCED experiment (Refactored): 24-layer nanochat on TinyStories.
# Focus: Improved surrogate sensitivity and optimization stability.

[uhd]
env_tag = "nanochat:tinystories"
policy_tag = "nanochat:d24"
total_timesteps = 48000
num_reps = 1

# Optimizer: BSZO (Bayesian Sparsity-aware Zeroth-Order)
optimizer = "bszo"
bszo_k = 2
bszo_alpha = 0.1
lr = 5e-5
sigma = 0.001
perturb = "dense"

# Behavioral Embedder (BE) setup
be_num_probes = 10
be_num_candidates = 12
be_warmup = 50

# Epistemic Nearest Neighbors (ENN) setup
enn_minus_impute = true
enn_fit_interval = 5
enn_se_threshold = 0.5
enn_num_candidates = 16

# Subspace & Topology
text_search_dim = 4096
text_delta_scale = 1.0
text_basis_max_tensors = 64
max_tokens = 256

steps_per_episode = 1
num_envs = 8
problem_seed = 42
noise_seed_0 = 0
seed_offset = 0
log_interval = 1
