# Run: ./ops/exp_uhd.py local configs/uhd/eggroll/cartpole_v1_mezo_enn_impute_smoke.toml

[uhd]
env_tag = "gymnax:CartPole-v1"
policy_tag = "eggroll-ac-mlp-8x1-pqn"
num_rounds = 10
optimizer = "mezo"
lr = 0.001
sigma = 0.001
perturb = "dense"
steps_per_episode = 4
num_envs = 1
deterministic_policy = false
log_interval = 1

be_num_probes = 4

enn_minus_impute = true
enn_target = "delta"
enn_k = 2
enn_fit_interval = 1
enn_warmup_real_obs = 2
enn_refresh_interval = 4
enn_se_threshold = 1000.0
enn_max_abs_err_ema = 1000.0
enn_min_calib_points = 1
