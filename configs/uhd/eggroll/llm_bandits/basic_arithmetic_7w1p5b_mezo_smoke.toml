#
# UHD MeZO smoke config for an upstream HyperscaleES LLM bandit task.

[uhd]
env_tag = "pretrain:hyperscalees:basic_arithmetic-7w1p5b"
policy_tag = "hyperscalees-rwkv-7w1p5b-lora-r1"
num_rounds = 5000
num_reps = 1
optimizer = "mezo"
lr = 0.001
sigma = 0.001
perturb = "dense"
steps_per_episode = 1
eval_episodes = 4
deterministic_policy = false
problem_seed = 0
noise_seed_0 = 0
seed_offset = 0
log_interval = 1

pretrain_search_dim = 512
pretrain_delta_scale = 1.0
pretrain_generation_length = 200
pretrain_lora_only = true
pretrain_basis_max_leaves = 32
enn_minus_impute = false
