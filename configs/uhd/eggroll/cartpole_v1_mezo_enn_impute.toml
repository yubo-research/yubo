# Run:
# ./ops/exp_uhd.py local configs/uhd/eggroll/cartpole_v1_mezo_enn_impute.toml

[uhd]
env_tag = "gymnax:CartPole-v1"
policy_tag = "eggroll-ac-mlp-8x1-pqn"
num_rounds = 2000
num_reps = 30
optimizer = "mezo"
lr = 0.001
sigma = 0.001
perturb = "dense"
steps_per_episode = 200
num_envs = 4
deterministic_policy = false
problem_seed = 0
noise_seed_0 = 0
seed_offset = 0
log_interval = 25

# Used for EggRoll JAX behavior embeddings when ENN minus-imputation is enabled.
be_num_probes = 16

enn_minus_impute = true
enn_target = "delta"
enn_d = 256
enn_s = 4
enn_jl_seed = 123
enn_k = 16
enn_fit_interval = 25
enn_warmup_real_obs = 64
enn_refresh_interval = 25
enn_se_threshold = 0.5
enn_err_ema_beta = 0.95
enn_max_abs_err_ema = 1.0
enn_min_calib_points = 16
