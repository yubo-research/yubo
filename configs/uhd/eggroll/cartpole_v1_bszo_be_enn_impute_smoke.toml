# Run: python -m ops.exp_uhd local configs/uhd/eggroll/cartpole_v1_bszo_be_enn_impute_smoke.toml

[uhd]
env_tag = "gymnax:CartPole-v1"
policy_tag = "eggroll-ac-mlp-8x1-pqn"
num_rounds = 3
optimizer = "bszo_be"
lr = 0.001
perturb = "dense"
steps_per_episode = 4
eval_episodes = 1
deterministic_policy = false
log_interval = 1

bszo_k = 2
bszo_epsilon = 0.001
bszo_sigma_p_sq = 1.0
bszo_sigma_e_sq = 1.0
bszo_alpha = 0.1

be_num_probes = 4
be_num_candidates = 2
be_warmup = 2
be_fit_interval = 1
be_enn_k = 2

enn_minus_impute = true
enn_target = "delta"
enn_k = 2
enn_fit_interval = 1
enn_warmup_real_obs = 2
enn_refresh_interval = 5
enn_se_threshold = 1000.0
enn_max_abs_err_ema = 1000.0
enn_min_calib_points = 1
