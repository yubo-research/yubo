# Run:
# python -m ops.exp_uhd local configs/uhd/eggroll/paper/hft/lobs5_360m_goog_2023_pnl_mezo_be.toml
#
# UHD companion to:
# configs/bo/eggroll/paper/hft/lobs5_360m_goog_2023_pnl_eggroll.toml
#
# This mirrors the HFT paper task using the EggRoll JAX-LOB env adapter and
# derives num_rounds from the total-timesteps budget.

[uhd]
env_tag = "jaxlob:goog-2023-sell-q30-t10"
policy_tag = "lobs5-360m-lora-r4"
total_timesteps = 500000000
num_reps = 1
optimizer = "mezo_be"
lr = 0.001
sigma = 0.01
perturb = "dense"
steps_per_episode = 1
eval_episodes = 1
deterministic_policy = false
problem_seed = 0
noise_seed_0 = 0
seed_offset = 0
log_interval = 1

# Behavior probes define the embedding. The BE optimizer fits an ENN on these
# embeddings and uses the fitted model to select candidate MeZO directions.
be_num_probes = 64
be_num_candidates = 32
be_warmup = 512
be_fit_interval = 100
be_enn_k = 32

enn_minus_impute = false
