# UHD BSZO + BE companion to:
# configs/bo/eggroll/paper/hft/lobs5_360m_goog_2023_pnl_eggroll.toml

[uhd]
env_tag = "jaxlob:goog-2023-sell-q30-t10"
policy_tag = "lobs5-360m-lora-r4"
total_timesteps = 500000000
num_reps = 1
optimizer = "bszo_be"
lr = 0.001
sigma = 0.01
