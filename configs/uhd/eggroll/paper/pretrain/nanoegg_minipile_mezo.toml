# Run:
# ./ops/exp_uhd.py local configs/uhd/eggroll/paper/pretrain/nanoegg_minipile_mezo.toml
#
# Compute-matched UHD MeZO companion to:
# configs/bo/eggroll/paper/pretrain/nanoegg_minipile_eggroll.toml
#
# Budget matches the EggRoll paper config by candidate-evaluation count:
#   5000 epochs * (8192 population + 1 eval episode) * 1 step = 40,965,000

[uhd]
env_tag = "pretrain:nanoegg:minipile"
policy_tag = "nanoegg:int8:6l:256d"
pretrain_delta_scale = 1000.0
total_timesteps = 40965000
num_reps = 1
optimizer = "mezo"
lr = 0.001
sigma = 0.001
perturb = "dense"
steps_per_episode = 1
num_envs = 1
deterministic_policy = false
problem_seed = 0
noise_seed_0 = 0
seed_offset = 0
log_interval = 1
enn_minus_impute = false
