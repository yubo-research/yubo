# Run:
# python -m ops.exp_uhd local configs/uhd/eggroll/paper/pretrain/nanoegg_minipile_mezo_enn_impute.toml
#
# UHD MeZO + ENN minus-imputation companion to:
# configs/pretrain/nanoegg/paper/minipile_pop8192_batch16.toml

[uhd]
env_tag = "pretrain:nanoegg:minipile-int8-6l256d"
policy_tag = "nanoegg-int8-6l-256d"
total_timesteps = 819200
num_reps = 1
optimizer = "mezo"
lr = 0.001
sigma = 0.001
perturb = "dense"
steps_per_episode = 1
eval_episodes = 1
deterministic_policy = false
problem_seed = 0
noise_seed_0 = 0
seed_offset = 0
log_interval = 1

be_num_probes = 64
enn_minus_impute = true
enn_target = "delta"
enn_d = 512
enn_s = 4
enn_jl_seed = 123
enn_k = 32
enn_fit_interval = 100
enn_warmup_real_obs = 512
enn_refresh_interval = 100
enn_se_threshold = 0.5
enn_err_ema_beta = 0.95
enn_max_abs_err_ema = 1.0
enn_min_calib_points = 64
