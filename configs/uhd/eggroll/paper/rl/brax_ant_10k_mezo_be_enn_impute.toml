# Run:
# ./ops/exp_uhd.py local configs/uhd/eggroll/paper/rl/brax_ant_10k_mezo_be_enn_impute.toml
#
# UHD MeZO + BE seed-selection + ENN minus-imputation companion to:
# configs/bo/eggroll/paper/rl/brax_ant_10k_eggroll.toml
#
# This keeps the same Brax Ant env, 9,998-param EggRoll policy, Ant paper
# optimizer scale, and EggRoll rank-1 perturbation surface.

[uhd]
env_tag = "brax:ant"
policy_tag = "eggroll-ac-mlp-62x2-pqn"
total_timesteps = 500000000
num_reps = 10
optimizer = "mezo_be"
lr = 0.01
sigma = 0.05
perturb = "eggroll"
steps_per_episode = 1000
num_envs = 1
deterministic_policy = false
problem_seed = 0
noise_seed_0 = 0
seed_offset = 0
log_interval = 100

eggroll_noiser = "eggroll"
eggroll_rank = 1
eggroll_group_size = 0
eggroll_freeze_nonlora = false

be_num_probes = 128
be_num_candidates = 64
be_warmup = 1024
be_fit_interval = 200
be_enn_k = 64

enn_minus_impute = true
enn_target = "delta"
enn_d = 512
enn_s = 4
enn_jl_seed = 123
enn_k = 64
enn_fit_interval = 200
enn_warmup_real_obs = 1024
enn_refresh_interval = 200
enn_se_threshold = 5.0
enn_err_ema_beta = 0.95
enn_max_abs_err_ema = 10.0
enn_min_calib_points = 64
