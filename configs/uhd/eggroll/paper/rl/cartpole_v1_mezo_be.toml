# Run:
# ./ops/exp_uhd.py local configs/uhd/eggroll/paper/rl/cartpole_v1_mezo_be.toml
#
# UHD MeZO + behavior-embedding seed-selection companion to:
# configs/bo/eggroll/paper/rl/cartpole_v1_eggroll.toml
#
# This keeps the same Gymnax CartPole env, policy family, 500-step horizon, and
# EggRoll rank-4 perturbation surface. The BE optimizer fits an ENN on behavior
# embeddings and uses it to select candidate MeZO directions.
#
# This is BE seed-selection only, not ENN minus-imputation.

[uhd]
env_tag = "gymnax:CartPole-v1"
policy_tag = "eggroll-ac-mlp-256x3-pqn"
total_timesteps = 500000000
num_reps = 30
optimizer = "mezo_be"
lr = 0.1
sigma = 0.2
perturb = "eggroll"
steps_per_episode = 500
num_envs = 8
deterministic_policy = false
problem_seed = 0
noise_seed_0 = 0
seed_offset = 0
log_interval = 100

eggroll_noiser = "eggroll"
eggroll_rank = 4
eggroll_group_size = 0
eggroll_freeze_nonlora = false

# Behavior probes define the embedding. The BE optimizer fits an ENN on these
# embeddings and uses the fitted model to select candidate MeZO directions.
be_num_probes = 64
be_num_candidates = 32
be_warmup = 512
be_fit_interval = 100
be_enn_k = 32

enn_minus_impute = false
