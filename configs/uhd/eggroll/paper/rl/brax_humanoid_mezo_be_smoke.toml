# Run:
# ./ops/exp_uhd.py local configs/uhd/eggroll/paper/rl/brax_humanoid_mezo_be_smoke.toml
#
# Smoke/debug variant of brax_humanoid_mezo_be.toml.
# Keeps the same Brax Humanoid env and EggRoll policy family, but shrinks the
# rollout budget and behavior-embedding startup cost so we can distinguish
# JAX/Brax compile latency from a real hang.

[uhd]
env_tag = "brax:humanoid"
policy_tag = "eggroll-ac-mlp-256x3-pqn"
num_rounds = 1e3
num_reps = 1
optimizer = "mezo_be"
lr = 0.1
sigma = 0.2
perturb = "dense"
steps_per_episode = 32
num_envs = 1
deterministic_policy = false
problem_seed = 0
noise_seed_0 = 0
seed_offset = 0
log_interval = 1

be_num_probes = 4
be_num_candidates = 4
be_warmup = 2
be_fit_interval = 2
be_enn_k = 2

enn_minus_impute = false
