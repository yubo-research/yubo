# Run:
# ./ops/exp_uhd.py local configs/uhd/eggroll/paper/rl/cartpole_v1_mezo_be_enn_impute.toml
#
# UHD MeZO + BE seed-selection + ENN minus-imputation companion to:
# configs/bo/eggroll/paper/rl/cartpole_v1_eggroll.toml
#
# This is the combined variant: BE selects promising MeZO directions after
# warmup, while ENN minus-imputation can replace some negative-phase rollouts.
# The perturbation surface matches the EggRoll config: noiser=eggroll, rank=4.

[uhd]
env_tag = "gymnax:CartPole-v1"
policy_tag = "eggroll-ac-mlp-256x3-pqn"
total_timesteps = 500000000
num_reps = 30
optimizer = "mezo_be"
lr = 0.1
sigma = 0.2
perturb = "eggroll"
steps_per_episode = 500
num_envs = 8
deterministic_policy = false
problem_seed = 0
noise_seed_0 = 0
seed_offset = 0
log_interval = 1

eggroll_noiser = "eggroll"
eggroll_rank = 4
eggroll_group_size = 0
eggroll_freeze_nonlora = false

be_num_probes = 64
be_num_candidates = 32
be_warmup = 512
be_fit_interval = 100
be_enn_k = 32

enn_minus_impute = true
enn_target = "delta"
enn_d = 512
enn_s = 4
enn_jl_seed = 123
enn_k = 32
enn_fit_interval = 100
enn_warmup_real_obs = 512
enn_refresh_interval = 100
enn_se_threshold = 0.5
enn_err_ema_beta = 0.95
enn_max_abs_err_ema = 1.0
enn_min_calib_points = 64
