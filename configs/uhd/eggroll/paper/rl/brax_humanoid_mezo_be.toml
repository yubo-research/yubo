# Run:
# ./ops/exp_uhd.py local configs/uhd/eggroll/paper/rl/brax_humanoid_mezo_be.toml
#
# Behavior-embedding ENN MeZO companion to:
# configs/bo/eggroll/paper/rl/brax_humanoid_eggroll.toml
#
# Budget matches the Brax Humanoid EggRoll paper config by real policy-evaluation
# env steps:
#   total_timesteps / (num_envs * steps_per_episode) derived eval rounds
#
# This combines BE-ENN seed selection with ENN minus-imputation.

[uhd]
env_tag = "brax:humanoid"
policy_tag = "eggroll-ac-mlp-256x3-pqn"
total_timesteps = 500000000
num_reps = 1
optimizer = "mezo_be"
lr = 0.1
sigma = 0.2
perturb = "dense"
steps_per_episode = 200
num_envs = 1
deterministic_policy = false
problem_seed = 0
noise_seed_0 = 0
seed_offset = 0
log_interval = 1

# Behavior probes define the embedding. Humanoid has richer continuous-control
# behavior than CartPole, so use more probes and candidates before ranking MeZO
# directions with the fitted ENN.
be_num_probes = 128
be_num_candidates = 64
be_warmup = 1024
be_fit_interval = 200
be_enn_k = 64

enn_minus_impute = true
enn_target = "delta"
enn_d = 16
enn_s = 4
enn_jl_seed = 123
enn_k = 64
enn_fit_interval = 200
enn_warmup_real_obs = 1024
enn_refresh_interval = 200
enn_se_threshold = 25.0
enn_err_ema_beta = 0.95
enn_max_abs_err_ema = 25.0
enn_min_calib_points = 64
