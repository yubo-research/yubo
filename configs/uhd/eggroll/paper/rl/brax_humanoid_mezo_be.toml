# Run:
# python -m ops.exp_uhd local configs/uhd/eggroll/paper/rl/brax_humanoid_mezo_be.toml
#
# Behavior-embedding ENN MeZO companion to:
# configs/bo/eggroll/paper/rl/brax_humanoid_eggroll.toml
#
# Budget matches the Brax Humanoid EggRoll paper config by real policy-evaluation
# env steps:
#   total_timesteps / (8 eval episodes * 200 steps) = 312500 derived eval rounds
#
# This is the BE-ENN seed-selection variant, not ENN minus-imputation.

[uhd]
env_tag = "brax:humanoid"
policy_tag = "eggroll-ac-mlp-256x3-pqn"
total_timesteps = 500000000
num_reps = 30
optimizer = "mezo_be"
lr = 0.1
sigma = 0.2
perturb = "dense"
steps_per_episode = 200
eval_episodes = 8
deterministic_policy = false
problem_seed = 0
noise_seed_0 = 0
seed_offset = 0
log_interval = 250

# Behavior probes define the embedding. Humanoid has richer continuous-control
# behavior than CartPole, so use more probes and candidates before ranking MeZO
# directions with the fitted ENN.
be_num_probes = 128
be_num_candidates = 64
be_warmup = 1024
be_fit_interval = 200
be_enn_k = 64

enn_minus_impute = false
