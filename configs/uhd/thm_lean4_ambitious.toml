# Ambitious UHD Configuration for Theorem Proving (Lean 4)
# Uses BSZO + Behavioral Embeddings + ENN Imputation
# Run: ./ops/exp_uhd.py local configs/uhd/thm_lean4_ambitious.toml

[uhd]
# --- Task & Model ---
env_tag = "llm:thm:lean4:cat-searcher/minif2f-lean4"
policy_tag = "qwen3-1p7b-lora-r8"
num_rounds = 5000
batch_size = 1

# --- Optimizer: BSZO-BE ---
optimizer = "bszo_be"
lr = 0.0005
bszo_epsilon = 0.001
bszo_k = 2
bszo_sigma_p_sq = 1.0
bszo_sigma_e_sq = 1.0
bszo_alpha = 0.1

# --- Behavioral Embedding (Gather) ---
be_num_probes = 64
be_num_candidates = 8
be_warmup = 16
be_fit_interval = 8

# --- ENN (Epistemic Nearest Neighbors) ---
enn_k = 16
enn_target = "delta"
enn_se_threshold = 0.2

# --- Subspace Configuration ---
pretrain_lora_only = false
pretrain_search_dim = 4096
pretrain_delta_scale = 1.0

# --- vLLM / Resource Config ---
max_tokens = 512
temperature = 0.0
prompt_batch_size = 1
tensor_parallel_size = 1
num_engines = 1
vllm_max_model_len = 4096
vllm_gpu_memory_utilization = 0.82
vllm_max_num_seqs = 8

# --- Logging ---
log_interval = 1
accuracy_interval = 10
