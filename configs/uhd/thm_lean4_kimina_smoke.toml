# Smoke UHD configuration for Lean 4 theorem proving with Kimina Prover.
# Run:
#   THM_DOCKER_RUNTIME='sudo -n docker' ./ops/build_lean4_mathlib_image.sh
#   THM_SANDBOX_BACKEND=local_docker THM_DOCKER_RUNTIME='sudo -n docker' \
#   ./ops/exp_uhd.py local configs/uhd/thm_lean4_kimina_smoke.toml

[uhd]
env_tag = "llm:thm:lean4:cat-searcher/minif2f-lean4"
policy_tag = "kimina-prover-1p5b-lora-r8"
num_rounds = 10
batch_size = 1

optimizer = "bszo_be"
lr = 0.0005
bszo_epsilon = 0.001
bszo_k = 2
bszo_sigma_p_sq = 1.0
bszo_sigma_e_sq = 1.0
bszo_alpha = 0.1

be_num_probes = 16
be_num_candidates = 4
be_warmup = 4
be_fit_interval = 4

enn_k = 8
enn_target = "delta"
enn_se_threshold = 0.2

pretrain_lora_only = true
pretrain_search_dim = 4096
pretrain_delta_scale = 1.0

max_tokens = 512
temperature = 0.6
prompt_batch_size = 1
tensor_parallel_size = 1
num_engines = 1
vllm_max_model_len = 4096
vllm_gpu_memory_utilization = 0.82
vllm_max_num_seqs = 8

log_interval = 1
accuracy_interval = 10
