# Run:
# ./ops/exp_uhd.py local configs/uhd/smoke_lean4.toml
#
# UHD MeZO smoke config for Theorem Proving (Lean 4).

[uhd]
env_tag = "llm:thm:lean4:cat-searcher/minif2f-lean4"
policy_tag = "qwen3-1p7b-lora-r1"
num_rounds = 1e5
num_reps = 1
optimizer = "mezo"
lr = 0.0001
sigma = 0.001
perturb = "dense"
steps_per_episode = 1
num_envs = 1
deterministic_policy = false
problem_seed = 0
noise_seed_0 = 0
seed_offset = 0
log_interval = 1

pretrain_search_dim = 128
pretrain_generation_length = 1024
pretrain_lora_only = true
pretrain_basis_max_leaves = 32
enn_minus_impute = false
