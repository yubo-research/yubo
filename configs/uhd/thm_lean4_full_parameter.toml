# Final Ambitious UHD Configuration
# Universal Full-Parameter Subspace Optimization for Theorem Proving
# Model: Qwen-3 1.7B
# Subspace: 4096-dim global coordinate random basis
#
# Run: ./experiments/llm.py local configs/uhd/thm_lean4_full_parameter.toml

[llm]
# --- Task & Model ---
env_tag = "llm:thm:lean4:cat-searcher/minif2f-lean4"
policy_tag = "qwen3-1p7b-lora-r1" # Base model selector
optimizer = "eggroll"             # Using the large-scale Ray runtime

# --- AMBITIOUS: Universal Subspace ---
# Disables LoRA and uses global coordinate random basis for every model parameter.
pretrain_lora_only = true
pretrain_search_dim = 4096

# --- Hyperparameters ---
num_rounds = 1000
population_size = 128
prompt_batch_size = 2
lr = 0.0001
sigma = 0.001

# --- Smart Components ---
normalize_with_std = true
scale_lr_in_grad = true
steps_per_adapter = 1

# --- Resources ---
num_gpus = 1
tensor_parallel_size = 1
num_engines = 1
max_tokens = 512
temperature = 0.0
vllm_max_model_len = 4096
vllm_gpu_memory_utilization = 0.82
vllm_max_num_seqs = 8

# --- Evaluation & Logging ---
steps_per_eval = 10
eval_batch_size = 32
log_interval = 1
