# Run: ./ops/experiment.py local configs/bo/gymnax/swimmer/eggroll_swimmer_smoke.toml

[experiment]
exp_dir = "runs/yubo_eggroll/swimmer_smoke"
env_tag = "gymnax:Swimmer-misc"
policy_tag = "eggroll-ac-mlp-64x2-silu"
population = 4
num_epochs = 1
num_reps = 1
runtime_device = "cuda"
local_workers = 1
b_trace = true

[optimizer]
name = "eggroll"

[optimizer.params]
noiser = "eggroll"
sigma = 0.05
rank = 8
lr = 0.02
steps = 10
num_envs = 2
optax = "adamw"
use_batched_update = true
