# Synthetic Ackley-3d TuRBO-Bayesian-MARS Thompson run.
#
# This exercises the Bayesian MARS posterior path with MCMC basis sampling while
# keeping the objective cheap enough for local iteration.
#
# Local:
#   ./ops/experiment.py local configs/bo/synthetic/ackley_3d_turbo_bmars_thompson.toml
#
# Modal:
#   modal run ops/modal_pixi_setup.py --config configs/bo/synthetic/ackley_3d_turbo_bmars_thompson.toml

[experiment]
exp_dir = "runs/bo/synthetic/ackley_3d_turbo_bmars_thompson"
env_tag = "f:ackley-3d"
policy_tag = "pure-function"
num_arms = 4
num_rounds = 100
num_reps = 5
num_denoise = 1
num_denoise_passive = 1
runtime_device = "cpu"
local_workers = 5
b_trace = true

[optimizer]
name = "turbo-bmars-thompson"

[optimizer.params]
num_init = 16
num_keep = 128
num_candidates = 2048
candidate_rv = "sobol"
max_terms = 24
interaction_order = 2
num_bootstrap = 1
active_rank = 6
trailing_obs = 128
feature_screen = 64
knots_per_feature = 5
ridge = 0.000001
active_samples = 128
prior_precision = 1.0
min_noise_variance = 0.00000001
include_noise_in_sigma = true
basis_sampler = "mcmc"
mcmc_steps = 96
mcmc_burn_in = 32
mcmc_thin = 4
mcmc_num_models = 16
mcmc_pool_size = 64
mcmc_term_prior = 0.125
