# Run on Modal after confirming the task exists:
# modal run ops/modal_hyperscalees_setup.py --command 'micromamba run -n yubo-hyperscalees ./ops/experiment.py local configs/bo/isaaclab/g1_flat_eggroll_dev.toml'
#
# List installed G1 tasks in the Modal/hyperscalees image with:
# modal run ops/modal_hyperscalees_setup.py --command 'micromamba run -n yubo-hyperscalees python -m problems.isaaclab_env_adapters --keyword G1'
#
# Development-scale Unitree G1 EggRoll run. Use the documented flat G1 task
# first; switch to a rough G1 task only after the task lister confirms it.

[experiment]
exp_dir = "runs/isaaclab/g1_flat_eggroll_dev"
env_tag = "isaaclab:Isaac-Velocity-Flat-G1-v0"
policy_tag = "eggroll-ac-mlp-256x3-pqn"
population = 8
num_epochs = 512
num_reps = 1
runtime_device = "cuda"
local_workers = 1
b_trace = true
video_enable = false
max_total_seconds = 7200

[optimizer]
name = "eggroll"

[optimizer.params]
noiser = "eggroll"
sigma = 0.05
rank = 4
lr = 0.01
optax = "adam"
batch_size = 1
num_envs = 512
steps = 96
use_batched_update = true
