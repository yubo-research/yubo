# Longer Isaac Lab G1 run: JAX EggRoll (batched sim, 32 parallel env slots).
# modal run ops/modal_pixi_setup.py --config configs/bo/isaaclab/g1_flat_eggroll_jax_long.toml

[experiment]
exp_dir = "runs/isaaclab/g1_flat_eggroll_jax_long"
env_tag = "isaaclab:Isaac-Velocity-Flat-G1-v0"
policy_tag = "eggroll-ac-mlp-64x2-pqn"
population = 32
num_epochs = 64
num_reps = 1
runtime_device = "cuda"
local_workers = 1
b_trace = true
max_total_seconds = 7200

[optimizer]
name = "eggroll/jax_sim=true"

[optimizer.params]
noiser = "eggroll"
sigma = 0.05
rank = 4
lr = 0.01
optax = "adam"
batch_size = 8
num_envs = 1
steps = 96
use_batched_update = true
