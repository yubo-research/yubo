[experiment]
exp_dir = "runs/issaclab"
# env_tag = "brax:ant"
env_tag = "isaaclab:Isaac-Velocity-Rough-Anymal-C-Direct-v0"
policy_tag = "eggroll-ac-mlp-64x2-pqn"
population = 8
num_epochs = 2
num_reps = 1
runtime_device = "cuda"
local_workers = 1
b_trace = true

[optimizer]
name = "eggroll"

[optimizer.params]
noiser = "eggroll"
sigma = 0.05
rank = 1
lr = 0.01
optax = "adam"
batch_size = 4
num_envs = 1
steps = 200
use_batched_update = true
