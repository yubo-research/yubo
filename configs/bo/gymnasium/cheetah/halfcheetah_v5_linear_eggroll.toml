# HalfCheetah-v5 EggRoll run with the repo's static linear policy.
#
# The env_tag "cheetah" is the local Gymnasium alias for HalfCheetah-v5.
#
# Local:
#   ./ops/experiment.py local configs/bo/gymnasium/cheetah/halfcheetah_v5_linear_eggroll.toml
#
# Modal:
#   modal run ops/modal_hyperscalees_pixi_setup.py --config configs/bo/gymnasium/cheetah/halfcheetah_v5_linear_eggroll.toml

[experiment]
exp_dir = "runs/bo/gymnasium/cheetah/halfcheetah_v5_linear_eggroll"
env_tag = "cheetah"
policy_tag = "linear"
population = 2
num_epochs = 1e4
num_reps = 10
runtime_device = "cpu"
local_workers = 10
b_trace = true

[optimizer]
name = "eggroll"

[optimizer.params]
noiser = "eggroll"
sigma = 0.05
rank = 1
lr = 0.01
optax = "adamw"
batch_size = 2
num_envs = 1
steps = 1000
