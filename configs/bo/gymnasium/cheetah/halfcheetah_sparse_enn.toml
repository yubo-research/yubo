# Sparse-ENN HalfCheetah large-policy smoke config.
#
# Run:
#   ./ops/experiment.py local \
#     configs/bo/gymnasium/cheetah/halfcheetah_sparse_enn.toml

[experiment]
exp_dir = "_tmp/bo/gymnasium/cheetah/sparse_enn_mlp1024_600"
env_tag = "cheetah"
policy_tag = "mlp-16-16"
num_arms = 1
num_rounds = 1e4
num_reps = 1
num_denoise = 1
num_denoise_passive = 1
b_trace = true
runtime_device = "cpu"
local_workers = 1

[optimizer]
name = "sparse-enn"

[optimizer.params]
clock_scale = 3.0
min_failures = 4.0
num_pert = 20
k = 10
num_init = 16
num_candidates = 4
num_fit_samples = 8
num_fit_candidates = 8
acq_type = "ucb"
candidate_rv = "uniform"
