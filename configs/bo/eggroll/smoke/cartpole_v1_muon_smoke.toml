# Run: ./ops/experiment.py local configs/bo/eggroll/smoke/cartpole_v1_muon_smoke.toml

[experiment]
exp_dir = "/tmp/yubo_eggroll_muon_smoke"
env_tag = "gymnax:CartPole-v1"
policy_tag = "eggroll-ac-mlp-64x2-pqn"
population = 4
num_epochs = 1
num_reps = 1
runtime_device = "cuda"
local_workers = 1
b_trace = true

[optimizer]
name = "eggroll"

[optimizer.params]
noiser = "eggroll"
sigma = 0.2
rank = 1
lr = 0.1
optax = "muon"
steps = 10
num_envs = 1
use_batched_update = true
