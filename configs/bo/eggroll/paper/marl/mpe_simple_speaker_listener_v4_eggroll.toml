# Run: python -m experiments.experiment local configs/bo/eggroll/paper/marl/mpe_simple_speaker_listener_v4_eggroll.toml
# Paper: Appendix N.1 / Table 8, MPE Simple Speaker Listener v4 EGGROLL.
# Runtime: uses the EggRoll JaxMARL adapter.

[experiment]
exp_dir = "runs/yubo_eggroll/paper/marl/mpe_simple_speaker_listener_v4_eggroll"
env_tag = "jaxmarl:mpe-simple-speaker-listener-v4"
policy_tag = "eggroll-marl-mlp-64x3-tanh"
population = 512
num_epochs = 4808
num_reps = 10
runtime_device = "cuda"
local_workers = 1
b_trace = true

[optimizer]
name = "eggroll"

[optimizer.params]
noiser = "eggroll"
sigma = 0.5
rank = 1
lr = 0.01
optax = "adamw"
use_batched_update = true
