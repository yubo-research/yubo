# Run:
# ./ops/experiment.py local configs/bo/eggroll/paper/pretrain/nanoegg_minipile_eggroll.toml
#
# NanoEgg MiniPile EggRoll paper experiment through the standard EggRoll
# designer. Exact source-script companion:
# ./ops/nanoegg_pretrain.py local configs/pretrain/nanoegg/paper/minipile_pop8192_batch16.toml

[experiment]
exp_dir = "runs/yubo_eggroll/paper/pretrain/nanoegg_minipile_eggroll"
env_tag = "pretrain:nanoegg:minipile"
policy_tag = "nanoegg:int8:6l:256d"
population = 8192
num_epochs = 5000
num_reps = 1
runtime_device = "cuda"
local_workers = 1
b_trace = true

[optimizer]
name = "eggroll"

[optimizer.params]
noiser = "eggroll"
sigma = 0.001
rank = 1
lr = 0.001
optax = "adamw"
steps = 1
num_envs = 1
batch_size = 16
use_batched_update = true
