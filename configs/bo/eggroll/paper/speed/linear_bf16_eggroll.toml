# Run: python -m experiments.experiment local configs/bo/eggroll/paper/speed/linear_bf16_eggroll.toml
# Paper: Figure 2a, linear-model speed benchmark for EGGROLL throughput.
# Runtime: uses the EggRoll synthetic linear-speed objective adapter.

[experiment]
exp_dir = "runs/yubo_eggroll/paper/speed/linear_bf16_eggroll"
env_tag = "synthetic:linear-speed"
policy_tag = "eggroll-linear-bf16-large"
population = 8192
num_epochs = 100
num_reps = 1
runtime_device = "cuda"
local_workers = 1
b_trace = true

[optimizer]
name = "eggroll"

[optimizer.params]
noiser = "eggroll"
sigma = 0.01
rank = 1
lr = 0.001
optax = "adamw"
steps = 1
eval_episodes = 1
use_batched_update = true
