# Run: ./ops/experiment.py local configs/bo/eggroll/paper/rl/craftax_symbolic_eggroll.toml
# Paper: Table 23, craftax/Craftax-Symbolic-AutoReset-v1 EGGROLL.

[experiment]
exp_dir = "runs/yubo_eggroll/paper/rl/craftax_symbolic_eggroll"
env_tag = "craftax:Craftax-Symbolic-AutoReset-v1"
policy_tag = "eggroll-ac-mlp-256x3-pqn"
population = 512
num_epochs = 4808
num_reps = 10
runtime_device = "cuda"
local_workers = 1
b_trace = true

[optimizer]
name = "eggroll"

[optimizer.params]
noiser = "eggroll"
sigma = 0.05
rank = 4
lr = 0.01
optax = "sgd"
use_batched_update = true
