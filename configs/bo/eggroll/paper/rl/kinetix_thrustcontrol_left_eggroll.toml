# Run: ./ops/experiment.py local configs/bo/eggroll/paper/rl/kinetix_thrustcontrol_left_eggroll.toml
# Paper: Table 28, kinetix/m/h17_thrustcontrol_left EGGROLL.

[experiment]
exp_dir = "runs/yubo_eggroll/paper/rl/kinetix_thrustcontrol_left_eggroll"
env_tag = "kinetix:m/h17_thrustcontrol_left"
policy_tag = "eggroll-ac-mlp-256x3-pqn"
population = 512
num_epochs = 4808
num_reps = 10
runtime_device = "cuda"
local_workers = 1
b_trace = true

[optimizer]
name = "eggroll"

[optimizer.params]
noiser = "eggroll"
sigma = 0.5
rank = 4
lr = 0.1
optax = "sgd"
use_batched_update = true
