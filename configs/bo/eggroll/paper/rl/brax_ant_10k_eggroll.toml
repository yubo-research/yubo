# Run: ./ops/experiment.py local configs/bo/eggroll/paper/rl/brax_ant_10k_eggroll.toml
#
# Brax Ant EggRoll config with the same paper optimizer settings as:
# configs/bo/eggroll/paper/rl/brax_ant_eggroll.toml
#
# Policy size: 9,998 params for Brax Ant (obs=27, act=8):
#   layers*h*h + h*(obs + act + layers) + 2*act, h=62, layers=2.

[experiment]
exp_dir = "runs/yubo_eggroll/paper/rl/brax_ant_10k_eggroll"
env_tag = "brax:ant"
policy_tag = "eggroll-ac-mlp-62x2-pqn"
population = 2048
num_epochs = 1216
num_reps = 10
runtime_device = "cuda"
local_workers = 1
b_trace = true

[optimizer]
name = "eggroll"

[optimizer.params]
noiser = "eggroll"
sigma = 0.05
rank = 1
lr = 0.01
optax = "adam"
use_batched_update = true
