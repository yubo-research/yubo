# Run: ./ops/experiment.py local configs/bo/eggroll/paper/rl/brax_inverted_double_pendulum_eggroll.toml
# Paper: Table 21, brax/inverted_double_pendulum EGGROLL.

[experiment]
exp_dir = "runs/yubo_eggroll/paper/rl/brax_inverted_double_pendulum_eggroll"
env_tag = "brax:inverted_double_pendulum"
policy_tag = "eggroll-ac-mlp-256x3-pqn"
population = 2048
num_epochs = 1216
num_reps = 10
runtime_device = "cuda"
local_workers = 1
b_trace = true

[optimizer]
name = "eggroll"

[optimizer.params]
noiser = "eggroll"
sigma = 0.5
rank = 2
lr = 0.1
optax = "adam"
use_batched_update = true
