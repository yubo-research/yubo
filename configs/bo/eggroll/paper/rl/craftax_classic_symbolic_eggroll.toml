# Run: python -m experiments.experiment local configs/bo/eggroll/paper/rl/craftax_classic_symbolic_eggroll.toml
# Paper: Table 22, craftax/Craftax-Classic-Symbolic-AutoReset-v1 EGGROLL.

[experiment]
exp_dir = "runs/yubo_eggroll/paper/rl/craftax_classic_symbolic_eggroll"
env_tag = "craftax:Craftax-Classic-Symbolic-AutoReset-v1"
policy_tag = "eggroll-ac-mlp-256x3-pqn"
population = 2048
num_epochs = 1216
num_reps = 10
runtime_device = "cuda"
local_workers = 1
b_trace = true

[optimizer]
name = "eggroll"

[optimizer.params]
noiser = "eggroll"
sigma = 0.05
rank = 1
lr = 0.01
optax = "sgd"
use_batched_update = true
