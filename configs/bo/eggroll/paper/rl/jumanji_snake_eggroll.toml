# Run: ./ops/experiment.py local configs/bo/eggroll/paper/rl/jumanji_snake_eggroll.toml
# Paper: Table 26, jumanji/Snake-v1 EGGROLL.

[experiment]
exp_dir = "runs/yubo_eggroll/paper/rl/jumanji_snake_eggroll"
env_tag = "jumanji:Snake-v1"
policy_tag = "eggroll-ac-mlp-256x3-pqn"
population = 4096
num_epochs = 610
num_reps = 10
runtime_device = "cuda"
local_workers = 1
b_trace = true

[optimizer]
name = "eggroll"

[optimizer.params]
noiser = "eggroll"
sigma = 0.05
rank = 1
lr = 0.001
optax = "adam"
use_batched_update = true
