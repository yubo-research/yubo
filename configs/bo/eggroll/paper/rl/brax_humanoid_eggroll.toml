# Run: python -m experiments.experiment local configs/bo/eggroll/paper/rl/brax_humanoid_eggroll.toml
# Paper: Table 20, brax/humanoid EGGROLL.

[experiment]
exp_dir = "runs/yubo_eggroll/paper/rl/brax_humanoid_eggroll"
env_tag = "brax:humanoid"
policy_tag = "eggroll-ac-mlp-256x3-pqn"
population = 4096
num_epochs = 610
num_reps = 10
runtime_device = "cuda"
local_workers = 1
b_trace = true

[optimizer]
name = "eggroll"

[optimizer.params]
noiser = "eggroll"
sigma = 0.2
rank = 1
lr = 0.1
optax = "adam"
use_batched_update = true
