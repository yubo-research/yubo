# Run: python -m experiments.experiment local configs/bo/eggroll/paper/rl/brax_ant_eggroll.toml
# Paper: Table 19, brax/ant EGGROLL.

[experiment]
exp_dir = "runs/yubo_eggroll/paper/rl/brax_ant_eggroll"
env_tag = "brax:ant"
policy_tag = "eggroll-ac-mlp-256x3-pqn"
population = 2048
num_epochs = 1216
num_reps = 10
runtime_device = "cuda"
local_workers = 1
b_trace = true

[optimizer]
name = "eggroll"

[optimizer.params]
noiser = "eggroll"
sigma = 0.05
rank = 1
lr = 0.01
optax = "adam"
use_batched_update = true
