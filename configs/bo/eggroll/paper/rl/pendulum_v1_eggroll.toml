# Run: ./ops/experiment.py local configs/bo/eggroll/paper/rl/pendulum_v1_eggroll.toml
# Paper: Table 18, Pendulum-v1 EGGROLL.

[experiment]
exp_dir = "runs/yubo_eggroll/paper/rl/pendulum_v1_eggroll"
env_tag = "gymnax:Pendulum-v1"
policy_tag = "eggroll-ac-mlp-256x3-pqn"
population = 4096
num_epochs = 610
num_reps = 10
runtime_device = "cuda"
local_workers = 1
b_trace = true

[optimizer]
name = "eggroll"

[optimizer.params]
noiser = "eggroll"
sigma = 0.05
rank = 4
lr = 0.01
optax = "adam"
steps = 200
num_envs = 8
use_batched_update = true
