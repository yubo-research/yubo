# Run: ./ops/experiment.py local configs/bo/eggroll/paper/rl/kinetix_hard_pinball_eggroll.toml
# Paper: Table 27, kinetix/l/hard_pinball EGGROLL.

[experiment]
exp_dir = "runs/yubo_eggroll/paper/rl/kinetix_hard_pinball_eggroll"
env_tag = "kinetix:l/hard_pinball"
policy_tag = "eggroll-ac-mlp-256x3-pqn"
population = 2048
num_epochs = 1216
num_reps = 10
runtime_device = "cuda"
local_workers = 1
b_trace = true

[optimizer]
name = "eggroll"

[optimizer.params]
noiser = "eggroll"
sigma = 0.05
rank = 4
lr = 0.01
optax = "sgd"
use_batched_update = true
