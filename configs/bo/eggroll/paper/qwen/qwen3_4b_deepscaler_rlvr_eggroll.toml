# Run: ./ops/experiment.py local configs/bo/eggroll/paper/qwen/qwen3_4b_deepscaler_rlvr_eggroll.toml
# Paper: Appendix L / Table 1 and Table 3, Qwen3-4B-Base RLVR on DeepScaleR.
# Runtime: uses the EggRoll Qwen external-objective adapter surface.

[experiment]
exp_dir = "runs/yubo_eggroll/paper/qwen/qwen3_4b_deepscaler_rlvr_eggroll"
env_tag = "qwen:deepscaler-rlvr"
policy_tag = "qwen3-4b-base-lora-r1"
population = 2048
num_epochs = 500
num_reps = 1
runtime_device = "cuda"
local_workers = 1
b_trace = true

[optimizer]
name = "eggroll"

[optimizer.params]
noiser = "eggroll"
sigma = 0.001
rank = 1
lr = 0.001
optax = "adamw"
noise_reuse = 4
steps = 1
num_envs = 1
