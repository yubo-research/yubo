# Run: ./ops/experiment.py local configs/bo/eggroll/paper/qwen/qwen3_1p7b_deepscaler_passk4_eggroll.toml
# Paper: Appendix L / Figure 10 and Table 3, Qwen3-1.7B pass@k optimisation with K=4.
# Runtime: uses the EggRoll DeepScaleR pass@k objective surface.

[experiment]
exp_dir = "runs/yubo_eggroll/paper/qwen/qwen3_1p7b_deepscaler_passk4_eggroll"
env_tag = "llm:deepscaler:passk4"
policy_tag = "qwen3-1p7b-lora-r1"
population = 256
num_epochs = 500
num_reps = 1
runtime_device = "cuda"
local_workers = 1
b_trace = true

[optimizer]
name = "eggroll"

[optimizer.params]
noiser = "eggroll"
sigma = 0.001
rank = 1
lr = 0.001
optax = "adamw"
noise_reuse = 4
steps = 1
num_envs = 1
