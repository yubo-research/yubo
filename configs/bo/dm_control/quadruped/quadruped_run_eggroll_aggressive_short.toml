# Run on Modal:
# modal run ops/modal_pixi_setup.py --config configs/bo/dm_control/quadruped/quadruped_run_eggroll_aggressive_short.toml
#
# Aggressive-short EggRoll run for dm_control/quadruped.
# This uses the external flat-policy scorer, not the JAX env adapter path.
# Budget: roughly (population + 1) * steps * num_epochs ~= 130k env steps.

[experiment]
exp_dir = "_tmp/bo/dm_control/quadruped/eggroll_aggressive_short"
env_tag = "dm_control/quadruped-run-v0"
policy_tag = "eggroll-ac-mlp-64x2-pqn"
population = 16
num_epochs = 120
num_reps = 1
runtime_device = "cpu"
local_workers = 1
b_trace = true
video_enable = false
max_total_seconds = 7200

[optimizer]
name = "eggroll"

[optimizer.params]
noiser = "eggroll"
sigma = 0.05
rank = 1
lr = 0.01
optax = "adam"
batch_size = 8
num_envs = 1
steps = 64
